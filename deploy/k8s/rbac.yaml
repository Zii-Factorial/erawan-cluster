apiVersion: v1
kind: ServiceAccount
metadata:
  name: erawan
  namespace: erawan
---
# Lease access is pre-provisioned for the Phase 2 job-runner leader election
# (coordination.k8s.io Leases) described in doc/ha-architecture.md. Harmless now;
# required once more than one replica runs.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: erawan-leader
  namespace: erawan
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: erawan-leader
  namespace: erawan
subjects:
  - kind: ServiceAccount
    name: erawan
    namespace: erawan
roleRef:
  kind: Role
  name: erawan-leader
  apiGroup: rbac.authorization.k8s.io
