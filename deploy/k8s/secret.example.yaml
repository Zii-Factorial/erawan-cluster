# Example only — DO NOT commit real secrets. Copy to secret.yaml, fill in, and keep
# it out of git (or use a SealedSecret / External Secrets / SOPS in production).
#
#   kubectl -n erawan create secret generic erawan-secrets \
#     --from-literal=API_KEY='<random-strong-key>' \
#     --from-literal=ENCRYPTION_KEY='<32-byte-base64-or-hex>' \
#     --from-file=ssh-privatekey=./clusterops_id_rsa
#
apiVersion: v1
kind: Secret
metadata:
  name: erawan-secrets
  namespace: erawan
type: Opaque
stringData:
  API_KEY: "change-me-strong-random"
  ENCRYPTION_KEY: "change-me-32-byte-key"
  # SSH private key Ansible uses to reach DB node VMs (mounted at CLUSTER_SSH_PRIVATE_KEY_PATH).
  ssh-privatekey: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    REPLACE_WITH_REAL_KEY
    -----END OPENSSH PRIVATE KEY-----
