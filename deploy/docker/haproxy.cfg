global
    log stdout format raw local0
    maxconn 50000
    # master-worker reloads are driven by SIGUSR2 (see haproxy-reload.sh)

defaults
    mode tcp
    log global
    option dontlognull
    timeout connect 5s
    timeout client 30s
    timeout server 30s

# Per-tenant `listen` blocks live in TENANTS_DIR and are loaded by passing that
# directory as a second `-f` argument in entrypoint.sh. The Go API writes/updates
# those files and calls haproxy-reload.sh to apply them with zero dropped connections.
