---
# ---------------------------------------------------------------------------
# PLAY 1 — Preflight checks
# ---------------------------------------------------------------------------
- name: Preflight checks
  hosts: all
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - preflight

# ---------------------------------------------------------------------------
# PLAY 2 — Configure all instances
# ---------------------------------------------------------------------------
- name: Configure instances
  hosts: all
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - configure_instances

# ---------------------------------------------------------------------------
# PLAY 3 — Cluster lifecycle on primary
# ---------------------------------------------------------------------------
- name: Cluster lifecycle on primary
  hosts: mysql_primary
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - create_cluster
    - add_instances
    - auto_rejoin
    - verify_cluster
    - init_app_db
    - boot_recovery

# ---------------------------------------------------------------------------
# PLAY 4 — Bootstrap MySQL Router on all nodes
# ---------------------------------------------------------------------------
- name: Bootstrap MySQL Router on all nodes
  hosts: all
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - bootstrap_router
