---
# ---------------------------------------------------------------------------
# PLAY 1 — Preflight checks
# ---------------------------------------------------------------------------
- name: Preflight checks
  hosts: all
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - preflight

# ---------------------------------------------------------------------------
# PLAY 2 — Configure all instances
# ---------------------------------------------------------------------------
- name: Configure instances
  hosts: all
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - configure_instances

# ---------------------------------------------------------------------------
# PLAY 3 — Cluster lifecycle on primary
# ---------------------------------------------------------------------------
- name: Cluster lifecycle on primary
  hosts: mysql_primary
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - create_cluster
    - add_instances

# ---------------------------------------------------------------------------
# PLAY 4 — Enable Group Replication auto-rejoin on all nodes (parallel)
# ---------------------------------------------------------------------------
- name: Enable auto-rejoin on all nodes
  hosts: all
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - auto_rejoin

# ---------------------------------------------------------------------------
# PLAY 5 — Verify cluster health
# ---------------------------------------------------------------------------
- name: Verify cluster health
  hosts: mysql_primary
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - verify_cluster

# ---------------------------------------------------------------------------
# PLAY 6 — Initialize application database (optional)
# ---------------------------------------------------------------------------
- name: Initialize application database
  hosts: mysql_primary
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - init_app_db

# ---------------------------------------------------------------------------
# PLAY 7 — Install boot-recovery service on all nodes (parallel)
# ---------------------------------------------------------------------------
- name: Install boot recovery on all nodes
  hosts: all
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - boot_recovery

# ---------------------------------------------------------------------------
# PLAY 8 — Install MySQL primary-check endpoint on all nodes (used by HAProxy
#           to route writes to the current Group Replication primary now that
#           MySQL Router is no longer part of this deployment)
# ---------------------------------------------------------------------------
- name: Install MySQL primary-check endpoint
  hosts: all
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - primary_check
