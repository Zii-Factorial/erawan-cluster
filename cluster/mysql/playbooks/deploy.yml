---
# ---------------------------------------------------------------------------
# PLAY 1 — Preflight checks (serial so failures are clear per-host)
# ---------------------------------------------------------------------------
- name: Preflight checks
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Include preflight tasks
      ansible.builtin.import_tasks: tasks/01_preflight.yml

# ---------------------------------------------------------------------------
# PLAY 2 — Configure all instances
# ---------------------------------------------------------------------------
- name: Configure instances
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Include configure-instance tasks
      ansible.builtin.import_tasks: tasks/02_configure_instances.yml

# ---------------------------------------------------------------------------
# PLAY 3 — Cluster lifecycle on primary
# ---------------------------------------------------------------------------
- name: Cluster lifecycle on primary
  hosts: mysql_primary
  gather_facts: false
  become: true
  tasks:
    - name: Include create-cluster tasks
      ansible.builtin.import_tasks: tasks/03_create_cluster.yml

    - name: Include add-instances tasks
      ansible.builtin.import_tasks: tasks/04_add_instances.yml

    - name: Include auto-rejoin tasks
      ansible.builtin.import_tasks: tasks/05_enable_auto_rejoin.yml

    - name: Include verify-cluster tasks
      ansible.builtin.import_tasks: tasks/06_verify_cluster.yml

    - name: Include init-app-db tasks
      ansible.builtin.import_tasks: tasks/07_init_app_db.yml

# ---------------------------------------------------------------------------
# PLAY 4 — Bootstrap MySQL Router on all nodes
# ---------------------------------------------------------------------------
- name: Bootstrap mysqlrouter on all nodes
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Include bootstrap-router tasks
      ansible.builtin.import_tasks: tasks/08_bootstrap_router.yml
