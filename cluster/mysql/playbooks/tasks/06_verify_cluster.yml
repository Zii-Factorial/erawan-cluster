- name: Gather network facts for MySQL cluster verification
  ansible.builtin.setup:
    gather_subset:
      - network
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['all'] }}"
  run_once: true
  tags: ["verify_cluster", "status_check"]

- name: Derive node IP facts for MySQL cluster verification
  ansible.builtin.set_fact:
    erawan_node_ip: >-
      {{
        ansible_host
        if (ansible_host | default('')) in (ansible_all_ipv4_addresses | default([]))
        else (ansible_default_ipv4.address | default(ansible_host))
      }}
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['all'] }}"
  run_once: true
  tags: ["verify_cluster", "status_check"]

- name: Verify cluster status
  ansible.builtin.shell: |
    set -euo pipefail
    _tmp=$(mktemp /tmp/erawan-XXXXXX.py)
    trap 'rm -f "$_tmp"' EXIT
    cat >"$_tmp" <<'PY'
    import json, os

    cluster_name   = os.environ["CLUSTER_NAME"]
    expected_nodes = int(os.environ["EXPECTED_CLUSTER_NODES"])
    primary_host    = {{ erawan_node_ip | to_json }}
    mysql_port      = {{ mysql_port }}
    admin_user      = {{ cluster_admin_username | to_json }}
    admin_pass      = {{ cluster_admin_password | to_json }}

    shell.connect({
      "user": admin_user,
      "password": admin_pass,
      "scheme": "mysql",
      "host": primary_host,
      "port": mysql_port,
    })

    status   = dba.get_cluster(cluster_name).status()
    rs       = status.get("defaultReplicaSet", {})
    rs_status = str(rs.get("status", ""))

    if not rs_status.startswith("OK"):
      raise RuntimeError(f"cluster status is not healthy: {rs_status}")
    if len(rs.get("topology", {})) < expected_nodes:
      raise RuntimeError(f"expected {expected_nodes} nodes, got {len(rs.get('topology', {}))}")

    print(json.dumps(status, indent=2))
    PY
    timeout {{ mysqlsh_verify_timeout_seconds | default(180) | int }} \
      mysqlsh --no-wizard --py --file "$_tmp"
  args:
    executable: /bin/bash
  environment:
    CLUSTER_NAME:           "{{ cluster_name }}"
    EXPECTED_CLUSTER_NODES: "{{ (standby_ips | length + 1) | string }}"
  changed_when: false
  tags: ["verify_cluster", "status_check"]
