- name: Gather network facts for MySQL cluster nodes
  ansible.builtin.setup:
    gather_subset:
      - network
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['all'] }}"
  run_once: true
  tags: ["add_instances"]

- name: Derive node IP facts for MySQL cluster nodes
  ansible.builtin.set_fact:
    erawan_node_ip: >-
      {{
        hostvars[item].ansible_host
        if (hostvars[item].ansible_host | default('')) in (hostvars[item].ansible_all_ipv4_addresses | default([]))
        else (hostvars[item].ansible_default_ipv4.address | default(hostvars[item].ansible_host))
      }}
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['all'] }}"
  run_once: true
  tags: ["add_instances"]

- name: Refresh cluster admin password on all nodes before join
  ansible.builtin.shell: |
    set -euo pipefail
    _tmp=$(mktemp /tmp/erawan-XXXXXX.py)
    trap 'rm -f "$_tmp"' EXIT
    cat >"$_tmp" <<'PY'
    import os

    shell.options["useWizards"] = False

    def connect_local_root():
      last_error = None
      for sock in ("/var/run/mysqld/mysqld.sock", "/run/mysqld/mysqld.sock", "/var/lib/mysql/mysql.sock"):
        if not os.path.exists(sock):
          continue
        try:
          shell.connect({"user": "root", "scheme": "mysql", "host": "localhost", "socket": sock})
          return shell.get_session()
        except Exception as exc:
          last_error = exc
      if last_error is not None:
        raise last_error
      raise RuntimeError("unable to find a usable MySQL local socket for root")

    session = connect_local_root()
    admin_user = {{ cluster_admin_username | to_json }}
    admin_pass = {{ cluster_admin_password | to_json }}
    eu = admin_user.replace("`", "``")

    session.run_sql(
      f"CREATE USER IF NOT EXISTS `{eu}`@'%' IDENTIFIED WITH mysql_native_password BY ?", [admin_pass]
    )
    session.run_sql(
      f"ALTER USER `{eu}`@'%' IDENTIFIED WITH mysql_native_password BY ?", [admin_pass]
    )
    session.run_sql(f"GRANT ALL PRIVILEGES ON *.* TO `{eu}`@'%' WITH GRANT OPTION")
    session.run_sql("FLUSH PRIVILEGES")
    PY
    timeout {{ mysqlsh_normalize_timeout_seconds | default(180) | int }} \
      mysqlsh --no-wizard --py --file "$_tmp"
  args:
    executable: /bin/bash
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  changed_when: false
  tags: ["add_instances"]

- name: Add secondary instances to cluster
  ansible.builtin.shell: |
    set -euo pipefail
    _tmp=$(mktemp /tmp/erawan-XXXXXX.py)
    trap 'rm -f "$_tmp"' EXIT
    cat >"$_tmp" <<'PY'
    import json
    import os
    import time

    shell.options["useWizards"] = False
    shell.options["dba.restartWaitTimeout"] = {{ step_timeout_seconds | default(900) | int }}
    primary_host        = {{ erawan_node_ip | to_json }}
    mysql_port          = {{ mysql_port }}
    cluster_admin_user  = {{ cluster_admin_username | to_json }}
    cluster_admin_pass  = {{ cluster_admin_password | to_json }}
    cluster_name        = {{ cluster_name | to_json }}
    recovery_method     = {{ mysql_recovery_method | default('auto') | to_json }}
    standby_hosts       = {{ groups['mysql_standby'] | map('extract', hostvars, 'erawan_node_ip') | list | to_json }}
    expected_nodes      = 1 + len(standby_hosts)
    wait_deadline       = time.time() + {{ mysqlsh_add_instances_wait_seconds | default(300) | int }}

    shell.connect({
      "user": cluster_admin_user,
      "password": cluster_admin_pass,
      "scheme": "mysql",
      "host": primary_host,
      "port": mysql_port,
    })
    cluster = dba.get_cluster(cluster_name)
    for host in standby_hosts:
      endpoint = f"{cluster_admin_user}@{host}:{mysql_port}"
      add_options = {
        "password": cluster_admin_pass,
        "recoveryMethod": recovery_method,
        "waitRecovery": 0,
      }
      try:
        cluster.add_instance(endpoint, add_options)
        print("added " + host)
      except Exception as e:
        msg = str(e).lower()
        if "already" in msg:
          print("already in cluster " + host)
        elif recovery_method != "clone" and (
          "instance provisioning required" in msg
          or "errant gtid" in msg
          or "must be either cloned or fully provisioned" in msg
        ):
          clone_options = dict(add_options)
          clone_options["recoveryMethod"] = "clone"
          cluster.add_instance(endpoint, clone_options)
          print("added via clone " + host)
        else:
          raise

    while time.time() < wait_deadline:
      cluster = dba.get_cluster(cluster_name)
      status = cluster.status()
      rs = status.get("defaultReplicaSet", {})
      topology = rs.get("topology", {})
      if len(topology) >= expected_nodes:
        print(json.dumps(status, indent=2))
        break
      time.sleep(5)
    else:
      cluster = dba.get_cluster(cluster_name)
      status = cluster.status()
      rs = status.get("defaultReplicaSet", {})
      topology = rs.get("topology", {})
      raise RuntimeError(
        f"expected {expected_nodes} nodes after add_instance, got {len(topology)}: "
        + json.dumps(status, indent=2)
      )
    PY
    timeout {{ mysqlsh_add_instances_timeout_seconds | default(900) | int }} \
      mysqlsh --no-wizard --py --file "$_tmp"
  args:
    executable: /bin/bash
  register: add_instances
  retries: "{{ add_instances_retries | default(2) | int }}"
  delay: "{{ add_instances_retry_delay_seconds | default(20) | int }}"
  until: add_instances.rc == 0
  changed_when: "'added ' in add_instances.stdout"
  tags: ["add_instances"]

- name: Rescan cluster metadata after instance changes
  ansible.builtin.shell: |
    set -euo pipefail
    _tmp=$(mktemp /tmp/erawan-XXXXXX.py)
    trap 'rm -f "$_tmp"' EXIT
    cat >"$_tmp" <<'PY'
    import json

    shell.options["useWizards"] = False
    primary_host       = {{ erawan_node_ip | to_json }}
    mysql_port         = {{ mysql_port }}
    cluster_admin_user = {{ cluster_admin_username | to_json }}
    cluster_admin_pass = {{ cluster_admin_password | to_json }}
    cluster_name       = {{ cluster_name | to_json }}

    shell.connect({
      "user": cluster_admin_user,
      "password": cluster_admin_pass,
      "scheme": "mysql",
      "host": primary_host,
      "port": mysql_port,
    })
    cluster = dba.get_cluster(cluster_name)
    result = cluster.rescan()
    print(json.dumps(result, indent=2))
    PY
    timeout {{ mysqlsh_rescan_timeout_seconds | default(180) | int }} \
      mysqlsh --no-wizard --py --file "$_tmp"
  args:
    executable: /bin/bash
  register: rescan_cluster
  changed_when: false
  tags: ["add_instances"]
