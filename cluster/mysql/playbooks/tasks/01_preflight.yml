- name: Wait for SSH to become available
  ansible.builtin.wait_for_connection:
    timeout: 120
    sleep: 5
  tags: ["preflight"]

- name: Ensure mysqlsh is installed
  ansible.builtin.command:
    argv: [mysqlsh, --version]
  register: mysqlsh_check
  changed_when: false
  failed_when: mysqlsh_check.rc != 0
  tags: ["preflight"]

- name: Verify MySQL root connectivity
  ansible.builtin.shell: |
    set -euo pipefail
    for i in $(seq 1 30); do
      for sock in /var/run/mysqld/mysqld.sock /run/mysqld/mysqld.sock /var/lib/mysql/mysql.sock; do
        if [ -S "$sock" ] && mysqladmin --socket="$sock" --user=root ping >/dev/null 2>&1; then
          exit 0
        fi
      done
      sleep 2
    done
    echo "MySQL did not become ready after 60s" >&2
    exit 1
  args:
    executable: /bin/bash
  register: mysql_ping
  changed_when: false
  failed_when: mysql_ping.rc != 0
  tags: ["preflight"]

- name: Ensure mysqlrouter is installed when bootstrap is enabled
  ansible.builtin.command:
    argv: [mysqlrouter, --version]
  register: mysqlrouter_check
  changed_when: false
  failed_when: mysqlrouter_check.rc != 0
  when: bootstrap_router | bool
  tags: ["preflight", "bootstrap_router"]
