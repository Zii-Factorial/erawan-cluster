- name: Wait for MySQL before enabling auto-rejoin settings
  ansible.builtin.wait_for:
    host: "{{ hostvars[item].ansible_host }}"
    port: "{{ mysql_port }}"
    state: started
    delay: 5
    timeout: "{{ mysql_start_timeout_seconds | default(300) | int }}"
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  tags: ["enable_auto_rejoin"]

- name: Enable Group Replication auto-start and rejoin
  ansible.builtin.shell: |
    set -euo pipefail
    _tmp=$(mktemp /tmp/erawan-XXXXXX.py)
    trap 'rm -f "$_tmp"' EXIT
    cat >"$_tmp" <<'PY'
    import os
    import time

    shell.options["useWizards"] = False
    autorejoin_tries = {{ mysql_gr_autorejoin_tries | default(3) | int }}
    unreachable_majority_timeout = {{ mysql_gr_unreachable_majority_timeout | default(30) | int }}
    exit_state_action = {{ mysql_gr_exit_state_action | default('READ_ONLY') | to_json }}
    retry_deadline = time.time() + {{ mysql_gr_option_retry_seconds | default(90) | int }}

    def connect_local_root():
      last_error = None
      for sock in ("/var/run/mysqld/mysqld.sock", "/run/mysqld/mysqld.sock", "/var/lib/mysql/mysql.sock"):
        if not os.path.exists(sock):
          continue
        try:
          shell.connect({"user": "root", "scheme": "mysql", "host": "localhost", "socket": sock})
          return shell.get_session()
        except Exception as exc:
          last_error = exc
      if last_error is not None:
        raise last_error
      raise RuntimeError("unable to find a usable MySQL local socket for root")

    session = connect_local_root()

    def run_sql_retry(stmt):
      last_error = None
      while time.time() < retry_deadline:
        try:
          session.run_sql(stmt)
          return
        except Exception as exc:
          msg = str(exc).lower()
          last_error = exc
          if "start or stop group_replication is ongoing" in msg:
            time.sleep(3)
            continue
          raise
      if last_error is not None:
        raise last_error

    for stmt in [
      "SET GLOBAL group_replication_start_on_boot = ON",
      "SET PERSIST group_replication_start_on_boot = ON",
      f"SET GLOBAL group_replication_autorejoin_tries = {autorejoin_tries}",
      f"SET PERSIST group_replication_autorejoin_tries = {autorejoin_tries}",
      f"SET GLOBAL group_replication_unreachable_majority_timeout = {unreachable_majority_timeout}",
      f"SET PERSIST group_replication_unreachable_majority_timeout = {unreachable_majority_timeout}",
      f"SET GLOBAL group_replication_exit_state_action = '{exit_state_action}'",
      f"SET PERSIST group_replication_exit_state_action = '{exit_state_action}'",
    ]:
      run_sql_retry(stmt)

    print("group replication auto-rejoin settings enabled")
    PY
    timeout {{ mysqlsh_enable_auto_rejoin_timeout_seconds | default(180) | int }} \
      mysqlsh --no-wizard --py --file "$_tmp"
  args:
    executable: /bin/bash
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  register: enable_auto_rejoin_result
  retries: "{{ enable_auto_rejoin_retries | default(6) | int }}"
  delay: "{{ enable_auto_rejoin_retry_delay_seconds | default(10) | int }}"
  until: enable_auto_rejoin_result.rc == 0
  changed_when: false
  tags: ["enable_auto_rejoin"]

- name: Install GR watchdog script
  ansible.builtin.copy:
    dest: /usr/local/bin/erawan-gr-watchdog
    mode: "0755"
    content: |
      #!/bin/bash
      # Auto-heals a stuck GR applier channel and rejoins the cluster.
      # Runs as a systemd timer every 60s. Safe to run repeatedly.

      STATE=$(mysql -uroot -Nse \
        "SELECT member_state FROM performance_schema.replication_group_members \
         WHERE member_host = @@report_host LIMIT 1" 2>/dev/null)

      if [[ "$STATE" == "ONLINE" || "$STATE" == "RECOVERING" ]]; then
        exit 0
      fi

      logger -t erawan-gr-watchdog "GR state is '${STATE:-unknown}' — attempting recovery"

      mysql -uroot 2>/dev/null <<'SQL'
      STOP GROUP_REPLICATION;
      RESET REPLICA ALL FOR CHANNEL 'group_replication_applier';
      START GROUP_REPLICATION;
      SQL

      sleep 10
      NEW_STATE=$(mysql -uroot -Nse \
        "SELECT member_state FROM performance_schema.replication_group_members \
         WHERE member_host = @@report_host LIMIT 1" 2>/dev/null)
      logger -t erawan-gr-watchdog "GR state after recovery attempt: '${NEW_STATE:-unknown}'"
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  tags: ["enable_auto_rejoin"]

- name: Install GR watchdog systemd service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/erawan-gr-watchdog.service
    mode: "0644"
    content: |
      [Unit]
      Description=Erawan GR watchdog — auto-heal stuck Group Replication applier
      After=mysql.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/erawan-gr-watchdog
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  tags: ["enable_auto_rejoin"]

- name: Install GR watchdog systemd timer unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/erawan-gr-watchdog.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Run erawan-gr-watchdog every 60 seconds

      [Timer]
      OnBootSec=120
      OnUnitActiveSec={{ gr_watchdog_interval_seconds | default(60) }}s
      AccuracySec=5s

      [Install]
      WantedBy=timers.target
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  tags: ["enable_auto_rejoin"]

- name: Enable and start GR watchdog timer
  ansible.builtin.systemd:
    name: erawan-gr-watchdog.timer
    daemon_reload: true
    enabled: true
    state: started
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  tags: ["enable_auto_rejoin"]
