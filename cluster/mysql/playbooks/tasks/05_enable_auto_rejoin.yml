- name: Enable Group Replication auto-start and rejoin
  ansible.builtin.shell: |
    set -euo pipefail
    sock=""
    for s in /var/run/mysqld/mysqld.sock /run/mysqld/mysqld.sock /var/lib/mysql/mysql.sock; do
      if [ -S "$s" ]; then sock="$s"; break; fi
    done
    [ -n "$sock" ] || { echo "no MySQL socket found" >&2; exit 1; }
    mysql -uroot --socket="$sock" <<'SQL' || exit 1
    SET GLOBAL  group_replication_start_on_boot                = ON;
    SET PERSIST group_replication_start_on_boot                = ON;
    SET GLOBAL  group_replication_autorejoin_tries             = {{ mysql_gr_autorejoin_tries | default(3) | int }};
    SET PERSIST group_replication_autorejoin_tries             = {{ mysql_gr_autorejoin_tries | default(3) | int }};
    SET GLOBAL  group_replication_unreachable_majority_timeout = {{ mysql_gr_unreachable_majority_timeout | default(0) | int }};
    SET PERSIST group_replication_unreachable_majority_timeout = {{ mysql_gr_unreachable_majority_timeout | default(0) | int }};
    SET GLOBAL  group_replication_exit_state_action            = '{{ mysql_gr_exit_state_action | default('READ_ONLY') }}';
    SET PERSIST group_replication_exit_state_action            = '{{ mysql_gr_exit_state_action | default('READ_ONLY') }}';
    SQL
  args:
    executable: /bin/bash
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  register: enable_auto_rejoin_result
  retries: "{{ enable_auto_rejoin_retries | default(6) | int }}"
  delay: "{{ enable_auto_rejoin_retry_delay_seconds | default(10) | int }}"
  until: enable_auto_rejoin_result.rc == 0
  changed_when: false
  tags: ["enable_auto_rejoin"]

- name: Install GR watchdog script
  ansible.builtin.copy:
    dest: /usr/local/bin/erawan-gr-watchdog
    mode: "0755"
    content: |
      #!/bin/bash
      # Auto-heals a stuck GR applier channel and rejoins the cluster.
      # Runs as a systemd timer every 60s. Safe to run repeatedly.

      STATE=$(mysql -uroot -Nse \
        "SELECT member_state FROM performance_schema.replication_group_members \
         WHERE member_host = @@report_host LIMIT 1" 2>/dev/null)

      if [[ "$STATE" == "ONLINE" || "$STATE" == "RECOVERING" ]]; then
        exit 0
      fi

      logger -t erawan-gr-watchdog "GR state is '${STATE:-unknown}' — attempting recovery"

      mysql -uroot 2>/dev/null <<'SQL'
      STOP GROUP_REPLICATION;
      RESET REPLICA ALL FOR CHANNEL 'group_replication_applier';
      START GROUP_REPLICATION;
      SQL

      sleep 10
      NEW_STATE=$(mysql -uroot -Nse \
        "SELECT member_state FROM performance_schema.replication_group_members \
         WHERE member_host = @@report_host LIMIT 1" 2>/dev/null)
      logger -t erawan-gr-watchdog "GR state after recovery attempt: '${NEW_STATE:-unknown}'"

      # After a successful rejoin, restart MySQL Router so it re-discovers the
      # current cluster topology and re-binds port 6446 (R/W) cleanly.
      # Without this, Router may retain stale state and refuse R/W connections.
      if [[ "$NEW_STATE" == "ONLINE" ]]; then
        logger -t erawan-gr-watchdog "Restarting MySQL Router to re-discover cluster topology"
        systemctl restart {{ router_service_name }} 2>/dev/null || true
      fi
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  tags: ["enable_auto_rejoin"]

- name: Install GR watchdog systemd service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/erawan-gr-watchdog.service
    mode: "0644"
    content: |
      [Unit]
      Description=Erawan GR watchdog — auto-heal stuck Group Replication applier
      After=mysql.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/erawan-gr-watchdog
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  tags: ["enable_auto_rejoin"]

- name: Install GR watchdog systemd timer unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/erawan-gr-watchdog.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Run erawan-gr-watchdog every 60 seconds

      [Timer]
      OnBootSec=120
      OnUnitActiveSec={{ gr_watchdog_interval_seconds | default(60) }}s
      AccuracySec=5s

      [Install]
      WantedBy=timers.target
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  tags: ["enable_auto_rejoin"]

- name: Enable and start GR watchdog timer
  ansible.builtin.systemd:
    name: erawan-gr-watchdog.timer
    daemon_reload: true
    enabled: true
    state: started
  delegate_to: "{{ item }}"
  loop: "{{ groups['all'] }}"
  tags: ["enable_auto_rejoin"]
