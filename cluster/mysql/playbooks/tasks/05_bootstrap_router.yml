- name: Gather network facts for MySQL router bootstrap
  ansible.builtin.setup:
    gather_subset:
      - network
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['all'] }}"
  run_once: true
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Derive node IP facts for MySQL router bootstrap
  ansible.builtin.set_fact:
    erawan_node_ip: >-
      {{
        hostvars[item].ansible_host
        if (hostvars[item].ansible_host | default('')) in (hostvars[item].ansible_all_ipv4_addresses | default([]))
        else (hostvars[item].ansible_default_ipv4.address | default(hostvars[item].ansible_host))
      }}
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['all'] }}"
  run_once: true
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Normalize clusteradmin grants for router bootstrap
  ansible.builtin.shell: |
    set -euo pipefail
    _tmp=$(mktemp /tmp/erawan-XXXXXX.py)
    trap 'rm -f "$_tmp"' EXIT
    cat >"$_tmp" <<'PY'
    import os

    shell.options["useWizards"] = False

    def connect_local_root():
      last_error = None
      for sock in ("/var/run/mysqld/mysqld.sock", "/run/mysqld/mysqld.sock", "/var/lib/mysql/mysql.sock"):
        if not os.path.exists(sock):
          continue
        try:
          shell.connect({"user": "root", "scheme": "mysql", "host": "localhost", "socket": sock})
          return shell.get_session()
        except Exception as exc:
          last_error = exc
      if last_error is not None:
        raise last_error
      raise RuntimeError("unable to find a usable MySQL local socket for root")

    session = connect_local_root()
    admin_user = {{ cluster_admin_username | to_json }}
    admin_pass = {{ cluster_admin_password | to_json }}
    eu = admin_user.replace("`", "``")

    desired = {"%", "localhost", "127.0.0.1", "::1", {{ primary_ip | to_json }}}
    for ip in {{ standby_ips | to_json }}:
      desired.add(str(ip))
    for row in session.run_sql("SELECT host FROM mysql.user WHERE user = ?", [admin_user]).fetch_all():
      if row and row[0] is not None:
        desired.add(str(row[0]))

    for host in sorted(desired):
      eh = str(host).replace("\\", "\\\\").replace("'", "''")
      session.run_sql(
        f"CREATE USER IF NOT EXISTS `{eu}`@'{eh}' IDENTIFIED WITH mysql_native_password BY ?", [admin_pass]
      )
      session.run_sql(
        f"ALTER USER `{eu}`@'{eh}' IDENTIFIED WITH mysql_native_password BY ?", [admin_pass]
      )
      session.run_sql(f"GRANT ALL PRIVILEGES ON *.* TO `{eu}`@'{eh}' WITH GRANT OPTION")
    session.run_sql("FLUSH PRIVILEGES")
    PY
    timeout 180 mysqlsh --no-wizard --py --file "$_tmp"
  args:
    executable: /bin/bash
  run_once: true
  delegate_to: primary
  changed_when: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Clean stale router metadata from MySQL cluster
  ansible.builtin.shell: |
    set -euo pipefail
    _tmp=$(mktemp /tmp/erawan-XXXXXX.py)
    trap 'rm -f "$_tmp"' EXIT
    cat >"$_tmp" <<'PY'
    import os

    shell.options["useWizards"] = False

    def connect_local_root():
      last_error = None
      for sock in ("/var/run/mysqld/mysqld.sock", "/run/mysqld/mysqld.sock", "/var/lib/mysql/mysql.sock"):
        if not os.path.exists(sock):
          continue
        try:
          shell.connect({"user": "root", "scheme": "mysql", "host": "localhost", "socket": sock})
          return shell.get_session()
        except Exception as exc:
          last_error = exc
      if last_error is not None:
        raise last_error
      raise RuntimeError("unable to find a usable MySQL local socket for root")

    session = connect_local_root()
    try:
      rows = session.run_sql(
        "SELECT router_id FROM mysql_innodb_cluster_metadata.routers"
      ).fetch_all()
      if rows:
        session.run_sql("DELETE FROM mysql_innodb_cluster_metadata.routers")
        print(f"cleaned {len(rows)} stale router metadata entries")
      else:
        print("no stale router metadata found")
    except Exception as e:
      if "doesn't exist" in str(e).lower() or "unknown table" in str(e).lower():
        print("metadata table not found - skipping")
      else:
        raise
    PY
    timeout 60 mysqlsh --no-wizard --py --file "$_tmp"
  args:
    executable: /bin/bash
  run_once: true
  delegate_to: primary
  changed_when: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Ensure mysqlrouter system user exists
  ansible.builtin.user:
    name: mysqlrouter
    system: true
    shell: /usr/sbin/nologin
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Remove stale router installation
  ansible.builtin.file:
    path: "/etc/mysqlrouter/{{ cluster_name }}"
    state: absent
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Create fresh mysqlrouter directory
  ansible.builtin.file:
    path: "/etc/mysqlrouter/{{ cluster_name }}"
    state: directory
    owner: mysqlrouter
    group: mysqlrouter
    mode: "0755"
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Stop mysqlrouter service if running
  ansible.builtin.systemd:
    name: "{{ router_service_name }}"
    state: stopped
  failed_when: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Allow MySQL Router ports through UFW
  ansible.builtin.shell: |
    set -euo pipefail
    if ! command -v ufw >/dev/null 2>&1; then
      exit 0
    fi
    if ! ufw status 2>/dev/null | grep -qw "active"; then
      exit 0
    fi
    ufw allow 6446/tcp comment 'MySQL Router RW'
    ufw allow 6447/tcp comment 'MySQL Router RO'
  args:
    executable: /bin/bash
  changed_when: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Bootstrap mysqlrouter
  ansible.builtin.shell: |
    set -euo pipefail
    printf '%s\n' {{ cluster_admin_password | quote }} | \
      timeout {{ mysqlrouter_bootstrap_timeout_seconds | default(180) | int }} \
      mysqlrouter \
        --bootstrap {{ cluster_admin_username | quote }}@{{ hostvars['primary'].erawan_node_ip }}:{{ mysql_port }} \
        --conf-use-gr-notifications \
        --conf-base-port 6446 \
        --directory /etc/mysqlrouter/{{ cluster_name }} \
        --user=mysqlrouter
  args:
    executable: /bin/bash
  register: bootstrap_router_result
  retries: "{{ bootstrap_router_retries | default(2) | int }}"
  delay: "{{ bootstrap_router_retry_delay_seconds | default(20) | int }}"
  until: bootstrap_router_result.rc == 0
  changed_when: bootstrap_router_result.rc == 0
  failed_when: bootstrap_router_result.rc != 0
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Ensure mysqlrouter config exists
  ansible.builtin.stat:
    path: "/etc/mysqlrouter/{{ cluster_name }}/mysqlrouter.conf"
  register: mysqlrouter_config
  failed_when: not mysqlrouter_config.stat.exists
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Ensure mysqlrouter binds on all interfaces
  ansible.builtin.replace:
    path: "/etc/mysqlrouter/{{ cluster_name }}/mysqlrouter.conf"
    regexp: '^(bind_address\s*=\s*).*$'
    replace: '\g<1>0.0.0.0'
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Verify router RW port is configured
  ansible.builtin.command:
    argv:
      - grep
      - -Eq
      - "^[[:space:]]*bind_port[[:space:]]*=[[:space:]]*6446[[:space:]]*$"
      - "/etc/mysqlrouter/{{ cluster_name }}/mysqlrouter.conf"
  changed_when: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Verify router RO port is configured
  ansible.builtin.command:
    argv:
      - grep
      - -Eq
      - "^[[:space:]]*bind_port[[:space:]]*=[[:space:]]*6447[[:space:]]*$"
      - "/etc/mysqlrouter/{{ cluster_name }}/mysqlrouter.conf"
  changed_when: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Install mysqlrouter systemd service
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ router_service_name }}.service"
    mode: "0644"
    content: |
      [Unit]
      Description=MySQL Router for {{ cluster_name }}
      After=network.target mysql.service
      Wants=network.target

      [Service]
      Type=simple
      User=mysqlrouter
      Group=mysqlrouter
      ExecStart=/usr/bin/mysqlrouter -c /etc/mysqlrouter/{{ cluster_name }}/mysqlrouter.conf
      Restart=always
      RestartSec=5
      LimitNOFILE=65535

      [Install]
      WantedBy=multi-user.target
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Enable and restart mysqlrouter service
  ansible.builtin.systemd:
    name: "{{ router_service_name }}"
    daemon_reload: true
    enabled: true
    state: restarted
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Wait for router RW port reachable from controller
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 6446
    state: started
    timeout: 60
  delegate_to: localhost
  become: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Wait for router RO port reachable from controller
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 6447
    state: started
    timeout: 60
  delegate_to: localhost
  become: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Verify router RW port reachable on node
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: 6446
    state: started
    timeout: 30
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Verify router RO port reachable on node
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: 6447
    state: started
    timeout: 30
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Verify mysqlrouter service is active
  ansible.builtin.systemd:
    name: "{{ router_service_name }}"
    state: started
  changed_when: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]
