- name: Derive node IP (fallback when configure_instances step was skipped)
  ansible.builtin.set_fact:
    erawan_node_ip: "{{ ansible_host }}"
  when: erawan_node_ip is not defined
  tags: ["bootstrap_router"]

- name: Normalize clusteradmin grants for router bootstrap
  ansible.builtin.shell: |
    set -euo pipefail
    _tmp=$(mktemp /tmp/erawan-XXXXXX.py)
    trap 'rm -f "$_tmp"' EXIT
    cat >"$_tmp" <<'PY'
    import os

    shell.options["useWizards"] = False

    def connect_local_root():
      last_error = None
      for sock in ("/var/run/mysqld/mysqld.sock", "/run/mysqld/mysqld.sock", "/var/lib/mysql/mysql.sock"):
        if not os.path.exists(sock):
          continue
        try:
          shell.connect({"user": "root", "scheme": "mysql", "host": "localhost", "socket": sock})
          return shell.get_session()
        except Exception as exc:
          last_error = exc
      if last_error is not None:
        raise last_error
      raise RuntimeError("unable to find a usable MySQL local socket for root")

    session    = connect_local_root()
    admin_user = {{ cluster_admin_username | to_json }}
    admin_pass = {{ cluster_admin_password | to_json }}
    eu         = admin_user.replace("`", "``")

    session.run_sql(
      f"CREATE USER IF NOT EXISTS `{eu}`@'%' IDENTIFIED WITH mysql_native_password BY ?", [admin_pass]
    )
    session.run_sql(
      f"ALTER USER `{eu}`@'%' IDENTIFIED WITH mysql_native_password BY ?", [admin_pass]
    )
    session.run_sql(f"GRANT ALL PRIVILEGES ON *.* TO `{eu}`@'%' WITH GRANT OPTION")
    session.run_sql("FLUSH PRIVILEGES")
    print("clusteradmin grants normalized")
    PY
    timeout 60 mysqlsh --no-wizard --py --file "$_tmp"
  args:
    executable: /bin/bash
  run_once: true
  delegate_to: primary
  register: normalize_router_grants
  retries: "{{ bootstrap_router_prepare_retries | default(6) | int }}"
  delay: "{{ bootstrap_router_prepare_retry_delay_seconds | default(10) | int }}"
  until: normalize_router_grants.rc == 0
  changed_when: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Clean stale router metadata from MySQL cluster
  ansible.builtin.shell: |
    set -euo pipefail
    _run_mysql() {
      if mysql -uroot "$@"; then
        return 0
      fi
      local sock
      for sock in /var/run/mysqld/mysqld.sock /run/mysqld/mysqld.sock /var/lib/mysql/mysql.sock; do
        if [[ -S "$sock" ]] && mysql --protocol=socket --socket="$sock" -uroot "$@"; then
          return 0
        fi
      done
      return 1
    }

    if ! _run_mysql -Nse "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='mysql_innodb_cluster_metadata' AND table_name='routers'"; then
      echo "unable to connect to local MySQL as root" >&2
      exit 1
    fi

    router_table_count="$(_run_mysql -Nse "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='mysql_innodb_cluster_metadata' AND table_name='routers'")"
    if [[ "${router_table_count}" != "1" ]]; then
      echo "metadata table not found - skipping"
      exit 0
    fi

    router_count="$(_run_mysql -Nse "SELECT COUNT(*) FROM mysql_innodb_cluster_metadata.routers")"
    if [[ "${router_count}" == "0" ]]; then
      echo "no stale router metadata found"
      exit 0
    fi

    _run_mysql -e "DELETE FROM mysql_innodb_cluster_metadata.routers"
    echo "cleaned ${router_count} stale router metadata entries"
  args:
    executable: /bin/bash
  run_once: true
  delegate_to: primary
  register: clean_router_metadata
  retries: "{{ bootstrap_router_prepare_retries | default(6) | int }}"
  delay: "{{ bootstrap_router_prepare_retry_delay_seconds | default(10) | int }}"
  until: clean_router_metadata.rc == 0
  changed_when: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Ensure mysqlrouter system user exists
  ansible.builtin.user:
    name: mysqlrouter
    system: true
    shell: /usr/sbin/nologin
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Remove stale router installation
  ansible.builtin.file:
    path: "/etc/mysqlrouter/{{ cluster_name }}"
    state: absent
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Create fresh mysqlrouter directory
  ansible.builtin.file:
    path: "/etc/mysqlrouter/{{ cluster_name }}"
    state: directory
    owner: mysqlrouter
    group: mysqlrouter
    mode: "0755"
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Stop mysqlrouter service if running
  ansible.builtin.systemd:
    name: "{{ router_service_name }}"
    state: stopped
  failed_when: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Allow MySQL Router ports through UFW
  ansible.builtin.shell: |
    set -euo pipefail
    if ! command -v ufw >/dev/null 2>&1; then
      exit 0
    fi
    if ! ufw status 2>/dev/null | grep -qw "active"; then
      exit 0
    fi
    ufw allow 6446/tcp comment 'MySQL Router RW'
    ufw allow 6447/tcp comment 'MySQL Router RO'
  args:
    executable: /bin/bash
  changed_when: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Bootstrap mysqlrouter
  ansible.builtin.shell: |
    set -euo pipefail
    printf '%s\n' {{ cluster_admin_password | quote }} | \
      timeout {{ mysqlrouter_bootstrap_timeout_seconds | default(180) | int }} \
      mysqlrouter \
        --bootstrap {{ cluster_admin_username | quote }}@{{ hostvars['primary'].erawan_node_ip }}:{{ mysql_port }} \
        --conf-use-gr-notifications \
        --conf-skip-x-protocol \
        --conf-base-port 6446 \
        --directory /etc/mysqlrouter/{{ cluster_name }} \
        --user=mysqlrouter
  args:
    executable: /bin/bash
  register: bootstrap_router_result
  retries: "{{ bootstrap_router_retries | default(2) | int }}"
  delay: "{{ bootstrap_router_retry_delay_seconds | default(20) | int }}"
  until: bootstrap_router_result.rc == 0
  changed_when: true
  failed_when: bootstrap_router_result.rc != 0
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Ensure mysqlrouter config exists
  ansible.builtin.stat:
    path: "/etc/mysqlrouter/{{ cluster_name }}/mysqlrouter.conf"
  register: mysqlrouter_config
  failed_when: not mysqlrouter_config.stat.exists
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Ensure mysqlrouter binds on all interfaces
  ansible.builtin.replace:
    path: "/etc/mysqlrouter/{{ cluster_name }}/mysqlrouter.conf"
    regexp: '^(bind_address\s*=\s*).*$'
    replace: '\g<1>0.0.0.0'
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Verify router RW and RO ports are configured
  ansible.builtin.shell: |
    grep -Eq "^[[:space:]]*bind_port[[:space:]]*=[[:space:]]*6446[[:space:]]*$" "/etc/mysqlrouter/{{ cluster_name }}/mysqlrouter.conf" &&
    grep -Eq "^[[:space:]]*bind_port[[:space:]]*=[[:space:]]*6447[[:space:]]*$" "/etc/mysqlrouter/{{ cluster_name }}/mysqlrouter.conf"
  args:
    executable: /bin/bash
  changed_when: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Install mysqlrouter systemd service
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ router_service_name }}.service"
    mode: "0644"
    content: |
      [Unit]
      Description=MySQL Router for {{ cluster_name }}
      After=network.target mysql.service
      Wants=network.target

      [Service]
      Type=simple
      User=mysqlrouter
      Group=mysqlrouter
      # Wait for MySQL socket to be ready before starting Router.
      # Ensures Router can reach the cluster on first start after a node reboot.
      ExecStartPre=/bin/bash -c 'for i in $(seq 1 15); do mysql -uroot -e "SELECT 1" 2>/dev/null && break || sleep 2; done'
      ExecStart=/usr/bin/mysqlrouter -c /etc/mysqlrouter/{{ cluster_name }}/mysqlrouter.conf
      Restart=always
      # 10s gap between restarts — gives MySQL time to stabilise before Router reconnects.
      RestartSec=10
      # Cap restart rate: max 5 starts per 5 minutes to avoid a crash loop.
      StartLimitIntervalSec=300
      StartLimitBurst=5
      LimitNOFILE=65535

      [Install]
      WantedBy=multi-user.target
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Enable and restart mysqlrouter service
  ansible.builtin.systemd:
    name: "{{ router_service_name }}"
    daemon_reload: true
    enabled: true
    state: restarted
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Wait for router RW port reachable from controller
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 6446
    state: started
    timeout: 60
  delegate_to: localhost
  become: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Wait for router RO port reachable from controller
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 6447
    state: started
    timeout: 60
  delegate_to: localhost
  become: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Verify router RW port reachable on node
  ansible.builtin.wait_for:
    host: "{{ erawan_node_ip }}"
    port: 6446
    state: started
    timeout: 30
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Verify router RO port reachable on node
  ansible.builtin.wait_for:
    host: "{{ erawan_node_ip }}"
    port: 6447
    state: started
    timeout: 30
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]

- name: Verify mysqlrouter service is active
  ansible.builtin.systemd:
    name: "{{ router_service_name }}"
    state: started
  changed_when: false
  when: bootstrap_router | bool
  tags: ["bootstrap_router"]
