---
- name: Derive node IP (fallback)
  ansible.builtin.set_fact:
    erawan_node_ip: "{{ ansible_host }}"
  when: erawan_node_ip is not defined
  tags: ["remove_member"]

- name: Remove member from InnoDB Cluster
  no_log: true
  ansible.builtin.shell: |
    set -euo pipefail
    _tmp=$(mktemp /tmp/erawan-XXXXXX.py)
    trap 'rm -f "$_tmp"' EXIT
    cat >"$_tmp" <<'PY'
    import json

    shell.options["useWizards"] = False
    shell.options["dba.restartWaitTimeout"] = {{ step_timeout_seconds | int }}

    primary_host       = {{ erawan_node_ip | to_json }}
    mysql_port         = {{ mysql_port }}
    cluster_admin_user = {{ cluster_admin_username | to_json }}
    cluster_admin_pass = {{ cluster_admin_password | to_json }}
    cluster_name       = {{ cluster_name | to_json }}
    remove_ip          = {{ remove_member_ip | to_json }}
    force_flag         = {{ force_remove | bool }}

    shell.connect(f"mysql://{cluster_admin_user}@{primary_host}:{mysql_port}", cluster_admin_pass)
    cluster  = dba.get_cluster(cluster_name)
    endpoint = f"{cluster_admin_user}@{remove_ip}:{mysql_port}"

    options = {"password": cluster_admin_pass, "force": force_flag}
    try:
      cluster.remove_instance(endpoint, options)
      print("removed: " + remove_ip)
    except Exception as e:
      msg = str(e).lower()
      if "not part" in msg or "not a member" in msg:
        print("not in cluster (already removed): " + remove_ip)
      elif force_flag:
        cluster.remove_instance(endpoint, {"password": cluster_admin_pass, "force": True})
        print("force removed: " + remove_ip)
      else:
        raise

    cluster.rescan()
    print(json.dumps(dba.get_cluster(cluster_name).status(), indent=2))
    PY
    timeout {{ step_timeout_seconds | int }} \
      mysqlsh --no-wizard --py --file "$_tmp"
  args:
    executable: /bin/bash
  register: remove_member_result
  changed_when: "'removed:' in remove_member_result.stdout"
  tags: ["remove_member"]
