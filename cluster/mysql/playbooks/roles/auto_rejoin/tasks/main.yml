---
- name: Enable Group Replication auto-start and rejoin
  ansible.builtin.shell: |
    set -euo pipefail
    sock=""
    for s in /var/run/mysqld/mysqld.sock /run/mysqld/mysqld.sock /var/lib/mysql/mysql.sock; do
      if [ -S "$s" ]; then sock="$s"; break; fi
    done
    [ -n "$sock" ] || { echo "no MySQL socket found" >&2; exit 1; }
    mysql -uroot --socket="$sock" <<'SQL' || exit 1
    SET GLOBAL  group_replication_start_on_boot                = ON;
    SET PERSIST group_replication_start_on_boot                = ON;
    SET GLOBAL  group_replication_autorejoin_tries             = {{ mysql_gr_autorejoin_tries }};
    SET PERSIST group_replication_autorejoin_tries             = {{ mysql_gr_autorejoin_tries }};
    SET GLOBAL  group_replication_member_expel_timeout         = {{ mysql_gr_member_expel_timeout }};
    SET PERSIST group_replication_member_expel_timeout         = {{ mysql_gr_member_expel_timeout }};
    SET GLOBAL  group_replication_unreachable_majority_timeout = {{ mysql_gr_unreachable_majority_timeout }};
    SET PERSIST group_replication_unreachable_majority_timeout = {{ mysql_gr_unreachable_majority_timeout }};
    SET GLOBAL  group_replication_exit_state_action            = '{{ mysql_gr_exit_state_action }}';
    SET PERSIST group_replication_exit_state_action            = '{{ mysql_gr_exit_state_action }}';
    SQL
  args:
    executable: /bin/bash
  register: enable_auto_rejoin_result
  retries: "{{ enable_auto_rejoin_retries }}"
  delay: "{{ enable_auto_rejoin_retry_delay_seconds }}"
  until: enable_auto_rejoin_result.rc == 0
  changed_when: false
  tags: ["enable_auto_rejoin"]

- name: Install GR watchdog script
  ansible.builtin.template:
    src: gr_watchdog.sh.j2
    dest: /usr/local/bin/erawan-gr-watchdog
    mode: "0755"
  tags: ["enable_auto_rejoin"]

- name: Install GR watchdog systemd service unit
  ansible.builtin.template:
    src: gr_watchdog.service.j2
    dest: /etc/systemd/system/erawan-gr-watchdog.service
    mode: "0644"
  tags: ["enable_auto_rejoin"]

- name: Install GR watchdog systemd timer unit
  ansible.builtin.template:
    src: gr_watchdog.timer.j2
    dest: /etc/systemd/system/erawan-gr-watchdog.timer
    mode: "0644"
  tags: ["enable_auto_rejoin"]

- name: Enable and start GR watchdog timer
  ansible.builtin.systemd:
    name: erawan-gr-watchdog.timer
    daemon_reload: true
    enabled: true
    state: started
  tags: ["enable_auto_rejoin"]
