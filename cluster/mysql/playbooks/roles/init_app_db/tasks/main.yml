---
- name: Initialize application database and user
  no_log: true
  ansible.builtin.shell: |
    set -euo pipefail
    _tmp=$(mktemp /tmp/erawan-XXXXXX.py)
    trap 'rm -f "$_tmp"' EXIT
    cat >"$_tmp" <<'PY'
    import os

    shell.options["useWizards"] = False

    last_error = None
    for sock in ("/var/run/mysqld/mysqld.sock", "/run/mysqld/mysqld.sock", "/var/lib/mysql/mysql.sock"):
      if not os.path.exists(sock):
        continue
      try:
        shell.connect({"user": "root", "scheme": "mysql", "host": "localhost", "socket": sock})
        break
      except Exception as exc:
        last_error = exc
    else:
      if last_error is not None:
        raise last_error
      raise RuntimeError("unable to find a usable MySQL local socket for root")

    session  = shell.get_session()
    db_name  = {{ new_db | to_json }}
    app_user = {{ new_user | to_json }}
    app_pass = {{ new_user_password | to_json }}
    ssl_req  = {{ (new_user_ssl_required | bool) | ternary('True', 'False') }}
    edb = db_name.replace("`", "``")
    eu  = app_user.replace("`", "``")

    session.run_sql(f"CREATE DATABASE IF NOT EXISTS `{edb}`")
    session.run_sql(
      f"CREATE USER IF NOT EXISTS `{eu}`@'%' IDENTIFIED WITH caching_sha2_password BY ?", [app_pass]
    )
    session.run_sql(
      f"ALTER USER `{eu}`@'%' IDENTIFIED WITH caching_sha2_password BY ?", [app_pass]
    )
    session.run_sql(f"ALTER USER `{eu}`@'%' {'REQUIRE SSL' if ssl_req else 'REQUIRE NONE'}")
    superuser = {{ (new_user_superuser | default(false)) | ternary('True', 'False') }}
    if superuser:
      session.run_sql(f"GRANT ALL PRIVILEGES ON *.* TO `{eu}`@'%' WITH GRANT OPTION")
      session.run_sql(f"GRANT ALL PRIVILEGES ON `{edb}`.* TO `{eu}`@'%'")
      dynamic_privs = [
        "AUDIT_ABORT_EXEMPT",
        "AUDIT_ADMIN",
        "AUTHENTICATION_POLICY_ADMIN",
        "BACKUP_ADMIN",
        "BINLOG_ADMIN",
        "BINLOG_ENCRYPTION_ADMIN",
        "CLONE_ADMIN",
        "CONNECTION_ADMIN",
        "ENCRYPTION_KEY_ADMIN",
        "FIREWALL_EXEMPT",
        "FLUSH_OPTIMIZER_COSTS",
        "FLUSH_STATUS",
        "FLUSH_TABLES",
        "FLUSH_USER_RESOURCES",
        "GROUP_REPLICATION_ADMIN",
        "GROUP_REPLICATION_STREAM",
        "INNODB_REDO_LOG_ARCHIVE",
        "INNODB_REDO_LOG_ENABLE",
        "PASSWORDLESS_USER_ADMIN",
        "PERSIST_RO_VARIABLES_ADMIN",
        "REPLICATION_APPLIER",
        "REPLICATION_SLAVE_ADMIN",
        "RESOURCE_GROUP_ADMIN",
        "RESOURCE_GROUP_USER",
        "ROLE_ADMIN",
        "SENSITIVE_VARIABLES_OBSERVER",
        "SERVICE_CONNECTION_ADMIN",
        "SESSION_VARIABLES_ADMIN",
        "SET_USER_ID",
        "SHOW_ROUTINE",
        "SKIP_QUERY_REWRITE",
        "SYSTEM_USER",
        "SYSTEM_VARIABLES_ADMIN",
        "TABLE_ENCRYPTION_ADMIN",
        "TELEMETRY_LOG_ADMIN",
        "XA_RECOVER_ADMIN",
      ]
      for priv in dynamic_privs:
        try:
          session.run_sql(f"GRANT {priv} ON *.* TO `{eu}`@'%' WITH GRANT OPTION")
        except Exception:
          pass
    else:
      session.run_sql(f"REVOKE ALL PRIVILEGES, GRANT OPTION FROM `{eu}`@'%'")
      session.run_sql(f"GRANT ALL PRIVILEGES ON `{edb}`.* TO `{eu}`@'%'")

    session.run_sql("FLUSH PRIVILEGES")
    print("application database and user initialized")
    PY
    timeout {{ mysqlsh_init_app_db_timeout_seconds | int }} \
      mysqlsh --no-wizard --py --file "$_tmp"
  args:
    executable: /bin/bash
  register: init_app_db_result
  # Retried because this fails intermittently right after cluster bootstrap
  # (observed: first deploy of a cluster fails here in ~2s, an identical
  # rerun minutes later succeeds — e.g. a transient super_read_only/primary
  # window just after Group Replication converges). failed_when: false so an
  # exhausted retry falls through to the fail task below, which can print a
  # redacted diagnosis — with no_log here, a direct failure is fully censored
  # and undebuggable.
  failed_when: false
  until: init_app_db_result.rc == 0
  retries: 6
  delay: 5
  changed_when: "'application database and user initialized' in (init_app_db_result.stdout | default(''))"
  when:
    - (new_user | default('') | string | length) > 0
    - (new_db | default('') | string | length) > 0
  tags: ["init_app_db"]

# Surfaces the failure despite no_log above (needed there because the rendered
# script embeds the app user's password). The password is redacted from the
# output before printing; mysqlsh/SQL error text itself never contains it
# (the CREATE/ALTER USER statements pass it as a bound parameter).
- name: Fail with init_app_db diagnostics (secrets redacted)
  vars:
    _init_diag: "{{ (init_app_db_result.stderr | default('')) ~ '\n' ~ (init_app_db_result.stdout | default('')) }}"
  ansible.builtin.fail:
    msg: |
      Application database initialization failed on {{ inventory_hostname }} (rc={{ init_app_db_result.rc | default('?') }}, {{ init_app_db_result.attempts | default(1) }} attempts):
      {{ (new_user_password | default('') | length > 0) | ternary(_init_diag | replace(new_user_password | default(''), '***'), _init_diag) }}
  when:
    - (new_user | default('') | string | length) > 0
    - (new_db | default('') | string | length) > 0
    - (init_app_db_result.rc | default(0)) != 0
  tags: ["init_app_db"]
