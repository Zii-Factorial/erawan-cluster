---
# Only restart here on the assume_prepared path: when assume_prepared is
# false, "Restart MySQL after stale GR reset" in tasks/main.yml restarts
# unconditionally a few tasks later and picks up the new config, so a second
# restart here would just double the deploy's per-node downtime.
- name: restart mysql
  ansible.builtin.systemd:
    name: mysql
    state: restarted
  when: _assume_prepared | default(assume_prepared) | bool
  listen: restart mysql on config change

- name: wait for mysql after config restart
  ansible.builtin.wait_for:
    host: "{{ erawan_node_ip }}"
    port: "{{ mysql_port }}"
    state: started
    timeout: "{{ mysql_start_timeout_seconds }}"
  when: _assume_prepared | default(assume_prepared) | bool
  listen: restart mysql on config change
