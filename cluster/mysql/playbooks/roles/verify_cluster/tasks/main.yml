---
- name: Derive node IP (fallback when configure_instances step was skipped)
  ansible.builtin.set_fact:
    erawan_node_ip: "{{ ansible_host }}"
  when: erawan_node_ip is not defined
  tags: ["verify_cluster", "status_check"]

# Bounded by wall clock (verify_cluster_budget_seconds), not attempt count:
# see defaults/main.yml for why. The loop always exits before the Go-side
# process deadline, so on failure the LAST status output (which members are
# stuck, in what state) lands in the job JSON via the task below instead of
# the process being killed mid-attempt with a bare "step execution timed out".
- name: Verify cluster status
  no_log: true
  ansible.builtin.shell: |
    set -uo pipefail
    _tmp=$(mktemp /tmp/erawan-XXXXXX.py)
    trap 'rm -f "$_tmp"' EXIT
    cat >"$_tmp" <<'PY'
    import json, os

    cluster_name   = os.environ["CLUSTER_NAME"]
    expected_nodes = int(os.environ["EXPECTED_CLUSTER_NODES"])
    primary_host    = {{ erawan_node_ip | to_json }}
    mysql_port      = {{ mysql_port }}
    admin_user      = {{ cluster_admin_username | to_json }}
    admin_pass      = {{ cluster_admin_password | to_json }}

    shell.connect(f"mysql://{admin_user}@{primary_host}:{mysql_port}", admin_pass)

    status    = dba.get_cluster(cluster_name).status()
    rs        = status.get("defaultReplicaSet", {})
    rs_status = str(rs.get("status", ""))
    topology  = rs.get("topology", {})
    online    = [k for k, v in topology.items() if v.get("status") == "ONLINE"]
    not_ready = {k: v.get("status") for k, v in topology.items() if v.get("status") != "ONLINE"}

    if not rs_status.startswith("OK"):
      raise RuntimeError(f"cluster not healthy — status: {rs_status}")
    if len(online) < expected_nodes:
      raise RuntimeError(
        f"expected {expected_nodes} ONLINE nodes, got {len(online)}"
        + (f" — not ready: {not_ready}" if not_ready else "")
      )

    print(json.dumps(status, indent=2))
    PY
    deadline=$(( $(date +%s) + {{ verify_cluster_budget_seconds | int }} ))
    attempt=0
    while :; do
      attempt=$(( attempt + 1 ))
      out=$(timeout {{ mysqlsh_verify_timeout_seconds | int }} \
          mysqlsh --no-wizard --py --file "$_tmp" 2>&1)
      rc=$?
      if [ "$rc" -eq 0 ]; then
        printf '%s\n' "$out"
        exit 0
      fi
      if [ "$(date +%s)" -ge "$deadline" ]; then
        printf 'cluster did not converge within {{ verify_cluster_budget_seconds | int }}s (%s attempts)\n' "$attempt" >&2
        printf 'last attempt (rc=%s):\n%s\n' "$rc" "$out" >&2
        exit 1
      fi
      sleep {{ verify_cluster_retry_delay_seconds | int }}
    done
  args:
    executable: /bin/bash
  environment:
    CLUSTER_NAME:           "{{ cluster_name }}"
    EXPECTED_CLUSTER_NODES: "{{ (standby_ips | length + 1) | string }}"
  register: verify_cluster_result
  failed_when: false
  changed_when: false
  tags: ["verify_cluster", "status_check"]

# Surfaces the loop's diagnostics despite no_log on the task above (needed
# there because the rendered script embeds credentials). The status/error
# output itself contains only member states and mysqlsh errors — no secrets.
- name: Fail with last cluster status on verification timeout
  ansible.builtin.fail:
    msg: |
      Cluster verification failed on {{ inventory_hostname }}:
      {{ verify_cluster_result.stderr | default('(no diagnostic output)') }}
  when: verify_cluster_result.rc != 0
  tags: ["verify_cluster", "status_check"]

# A cluster can verify healthy above and still be unreachable for clients:
# HAProxy routes by the primary-check endpoint (:9200), so if that service is
# dead on the nodes, every connection dies with "no server available" while
# the job reports green (observed after a scale recreated the node VMs).
# Assert the actual routing contract — every node answering, exactly one
# advertising itself primary (200). Skipped when the unit is not installed
# yet: on a first deploy this play runs before the primary_check play, whose
# own local probe covers that path.
- name: Check whether the primary-check service is installed
  ansible.builtin.stat:
    path: /etc/systemd/system/erawan-mysql-primary-check.service
  register: _pc_unit_stat
  tags: ["verify_cluster", "status_check"]

- name: Verify primary-check endpoints route exactly one primary
  ansible.builtin.shell: |
    set -euo pipefail
    python3 - <<'PYEOF'
    import sys, time, urllib.request, urllib.error

    nodes = [n for n in "{{ ([primary_ip] + (standby_ips | default([]))) | join(',') }}".split(',') if n]
    port = {{ primary_check_port | default(9200) }}
    deadline = time.time() + {{ primary_check_verify_budget_seconds | int }}

    while True:
        results = {}
        for n in nodes:
            try:
                with urllib.request.urlopen(f"http://{n}:{port}/", timeout=4) as r:
                    results[n] = r.status
            except urllib.error.HTTPError as e:
                results[n] = e.code
            except Exception as e:
                results[n] = f"unreachable ({e})"
        ok = all(v in (200, 503) for v in results.values())
        primaries = sum(1 for v in results.values() if v == 200)
        if ok and primaries == 1:
            print(f"primary-check routing OK: {results}")
            sys.exit(0)
        if time.time() >= deadline:
            print(
                "primary-check endpoints are not routable for HAProxy "
                f"(need every node answering and exactly one 200): {results}",
                file=sys.stderr,
            )
            sys.exit(1)
        time.sleep(3)
    PYEOF
  args:
    executable: /bin/bash
  changed_when: false
  when: _pc_unit_stat.stat.exists
  tags: ["verify_cluster", "status_check"]
