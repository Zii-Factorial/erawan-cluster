---
- name: Install MySQL primary-check script
  ansible.builtin.template:
    src: primary_check.py.j2
    dest: /usr/local/bin/erawan-mysql-primary-check
    mode: "0755"
  tags: ["primary_check"]

- name: Install MySQL primary-check systemd service
  ansible.builtin.template:
    src: primary_check.service.j2
    dest: /etc/systemd/system/erawan-mysql-primary-check.service
    mode: "0644"
  tags: ["primary_check"]

- name: Check UFW availability and status
  ansible.builtin.command:
    argv: [ufw, status]
  register: _ufw_status
  changed_when: false
  failed_when: false
  tags: ["primary_check"]

- name: Allow primary-check port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ primary_check_port | string }}"
    proto: tcp
    comment: MySQL primary-check for HAProxy
  when: "_ufw_status.rc == 0 and 'Status: active' in (_ufw_status.stdout | default(''))"
  tags: ["primary_check"]

- name: Enable and restart MySQL primary-check service
  ansible.builtin.systemd:
    name: erawan-mysql-primary-check.service
    daemon_reload: true
    enabled: true
    state: restarted
  tags: ["primary_check"]

- name: Verify primary-check endpoint responds
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ primary_check_port }}/"
    status_code: [200, 503]
  register: _primary_check_probe
  retries: 5
  delay: 2
  until: _primary_check_probe is succeeded
  tags: ["primary_check"]

# HAProxy routes by these endpoints, so a cluster is only reachable for
# clients when every node answers and exactly one advertises primary (200).
# Runs here — after the checker was just (re)started on every node — so the
# happy path is a single ~1s round; the retry budget is only consumed when
# routing is genuinely broken (observed after a scale recreated the node
# VMs: cluster healthy, checkers dead, every client got "no server
# available" while the job reported green).
- name: Verify primary-check endpoints route exactly one primary
  ansible.builtin.shell: |
    set -euo pipefail
    python3 - <<'PYEOF'
    import sys, time, urllib.request, urllib.error

    nodes = [n for n in "{{ ([primary_ip] + (standby_ips | default([]))) | join(',') }}".split(',') if n]
    port = {{ primary_check_port | int }}
    deadline = time.time() + {{ primary_check_routing_budget_seconds | int }}

    while True:
        results = {}
        for n in nodes:
            try:
                with urllib.request.urlopen(f"http://{n}:{port}/", timeout=4) as r:
                    results[n] = r.status
            except urllib.error.HTTPError as e:
                results[n] = e.code
            except Exception as e:
                results[n] = f"unreachable ({e})"
        ok = all(v in (200, 503) for v in results.values())
        primaries = sum(1 for v in results.values() if v == 200)
        if ok and primaries == 1:
            print(f"primary-check routing OK: {results}")
            sys.exit(0)
        if time.time() >= deadline:
            print(
                "primary-check endpoints are not routable for HAProxy "
                f"(need every node answering and exactly one 200): {results}",
                file=sys.stderr,
            )
            sys.exit(1)
        time.sleep(3)
    PYEOF
  args:
    executable: /bin/bash
  changed_when: false
  run_once: true
  tags: ["primary_check"]
