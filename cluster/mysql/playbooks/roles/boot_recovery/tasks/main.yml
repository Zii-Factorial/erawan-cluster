---
# Start/recover is routinely called right after the nodes themselves were
# rebooted or recreated by a scale operation, and — unlike deploy — nothing
# ran preflight first: the first task used to SSH straight in and fail the
# whole job (UNREACHABLE / sudo prompt timeout) on a node that was seconds
# away from ready. Same manageability test as preflight (SSH + sudo + remote
# Python via the play's become); immediate no-op when nodes are already up.
- name: Wait for the node to become manageable
  tags: ["boot_recovery"]
  block:
    - name: Wait for SSH connection and privilege escalation
      ansible.builtin.wait_for_connection:
        timeout: "{{ preflight_connect_timeout_seconds | default(300) }}"
        sleep: 2
  rescue:
    - name: Probe SSH and sudo layers separately
      ansible.builtin.raw: whoami && { sudo -n true && echo SUDO_OK || echo SUDO_FAIL; }
      become: false
      register: _recovery_conn_probe
      changed_when: false
      failed_when: false

    - name: Fail with connection diagnosis
      ansible.builtin.fail:
        msg: >-
          {% if _recovery_conn_probe.rc != 0 -%}
          Node {{ ansible_host }} is not reachable over SSH as
          {{ ansible_user | default('the configured user') }}:
          {{ _recovery_conn_probe.stderr | default('') | trim }}
          {%- elif 'SUDO_FAIL' in (_recovery_conn_probe.stdout | default('')) -%}
          SSH to {{ ansible_host }} works but passwordless sudo is not
          configured for the connecting user — node provisioning
          (cloud-init) is likely incomplete or misconfigured.
          {%- else -%}
          SSH and sudo work on {{ ansible_host }} but the Ansible Python
          test never succeeded — check that python3 is installed on the node.
          {%- endif %}

- name: Ensure erawan config directory exists
  ansible.builtin.file:
    path: /etc/erawan-cluster
    state: directory
    mode: "0700"
  tags: ["boot_recovery"]

- name: Write cluster recovery credentials
  no_log: true
  ansible.builtin.copy:
    dest: /etc/erawan-cluster/mysql-recovery.json
    mode: "0600"
    content: |
      {{ {
        'cluster_name': cluster_name,
        'admin_user':   cluster_admin_username,
        'admin_pass':   cluster_admin_password,
        'mysql_port':   mysql_port | int,
        'node_ips':     ([primary_ip] + standby_ips) | list
      } | to_nice_json }}
  tags: ["boot_recovery"]

- name: Install boot recovery script
  ansible.builtin.template:
    src: mysql_boot_recovery.sh.j2
    dest: /usr/local/bin/erawan-mysql-boot-recovery
    mode: "0755"
  tags: ["boot_recovery"]

- name: Install boot recovery systemd service
  ansible.builtin.template:
    src: mysql_boot_recovery.service.j2
    dest: /etc/systemd/system/erawan-mysql-boot-recovery.service
    mode: "0644"
  vars:
    boot_recovery_delay_seconds: "{{ ((groups['all'] | list).index(inventory_hostname) + 1) * (boot_recovery_delay_step_seconds | int) }}"
  tags: ["boot_recovery"]

- name: Ensure MySQL service is running
  ansible.builtin.systemd:
    name: mysql
    state: started
  tags: ["boot_recovery"]

# Enabled only — the staggered per-node systemd race (30/60/90s delays) is
# for unattended host reboots. Starting the unit on every node here made all
# three race each other: secondaries hit benign rejoin errors and failed the
# play, and deploys blocked through the full stagger delay for nothing.
- name: Enable boot recovery service for future reboots
  ansible.builtin.systemd:
    name: erawan-mysql-boot-recovery.service
    daemon_reload: true
    enabled: true
  tags: ["boot_recovery"]

# The watchdog fires every 60s on every node and does STOP GROUP_REPLICATION
# + rejoinInstance when its node isn't ONLINE — exactly the state every node
# is in during a cluster start. Left running, it races the primary's
# rebootClusterFromCompleteOutage for cluster metadata locks (observed: starts
# stalling to the 300s mysqlsh timeout). Pause it for the duration and always
# resume, even on failure, so a half-recovered cluster can still self-heal.
#
# ignore_errors/ignore_unreachable on the watchdog/exporter tasks: these are
# best-effort, but failed_when only overrides *module* results — a transient
# sudo-prompt timeout or connection drop fails the host (and the whole job)
# anyway. Observed in production: recovery succeeded, then standby_1 died on
# "Resume GR watchdog" with "Timeout (12s) waiting for privilege escalation
# prompt" and the job was marked failed.
- name: Pause GR watchdog during recovery
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - erawan-gr-watchdog.timer
    - erawan-gr-watchdog.service
  failed_when: false
  ignore_errors: true
  ignore_unreachable: true
  tags: ["boot_recovery"]

- name: Run recovery with the watchdog paused
  tags: ["boot_recovery"]
  block:
    # On-demand recovery (deploy / start / recover): run the script once, from
    # the primary, with no stagger delay. reboot_cluster_from_complete_outage()
    # rejoins every reachable member itself; verify_cluster and the GR watchdog
    # pick up any straggler. If the cluster is already online the script exits
    # immediately, so on a fresh deploy this is a ~2s no-op.
    - name: Run cluster recovery from the primary
      ansible.builtin.command: /usr/local/bin/erawan-mysql-boot-recovery
      environment:
        BOOT_RECOVERY_DELAY_SECONDS: "0"
      when: inventory_hostname in groups['mysql_primary']
      changed_when: true
  always:
    - name: Resume GR watchdog
      ansible.builtin.systemd:
        name: erawan-gr-watchdog.timer
        state: started
      failed_when: false
      ignore_errors: true
      ignore_unreachable: true

    # The mysqld exporter ships in the VM image with its unit tied to
    # mysql.service, so stopping the cluster kills it and nothing restarts it
    # — every metrics call then reports "mysqld_exporter unreachable on all
    # nodes". The unit name varies by image, so probe the common ones.
    - name: Ensure mysqld exporter is running
      ansible.builtin.shell: |
        set -euo pipefail
        for unit in mysqld_exporter mysql_exporter prometheus-mysqld-exporter; do
          if systemctl list-unit-files --no-legend "${unit}.service" 2>/dev/null | grep -q .; then
            systemctl start "${unit}.service"
            exit 0
          fi
        done
        echo "no mysqld exporter unit found" >&2
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      ignore_errors: true
      ignore_unreachable: true
