---
- name: Ensure erawan config directory exists
  ansible.builtin.file:
    path: /etc/erawan-cluster
    state: directory
    mode: "0700"
  tags: ["boot_recovery"]

- name: Write cluster recovery credentials
  no_log: true
  ansible.builtin.copy:
    dest: /etc/erawan-cluster/mysql-recovery.json
    mode: "0600"
    content: |
      {{ {
        'cluster_name': cluster_name,
        'admin_user':   cluster_admin_username,
        'admin_pass':   cluster_admin_password,
        'mysql_port':   mysql_port | int,
        'node_ips':     ([primary_ip] + standby_ips) | list
      } | to_nice_json }}
  tags: ["boot_recovery"]

- name: Install boot recovery script
  ansible.builtin.template:
    src: mysql_boot_recovery.sh.j2
    dest: /usr/local/bin/erawan-mysql-boot-recovery
    mode: "0755"
  tags: ["boot_recovery"]

- name: Install boot recovery systemd service
  ansible.builtin.template:
    src: mysql_boot_recovery.service.j2
    dest: /etc/systemd/system/erawan-mysql-boot-recovery.service
    mode: "0644"
  vars:
    boot_recovery_delay_seconds: "{{ ((groups['all'] | list).index(inventory_hostname) + 1) * (boot_recovery_delay_step_seconds | int) }}"
  tags: ["boot_recovery"]

- name: Ensure MySQL service is running
  ansible.builtin.systemd:
    name: mysql
    state: started
  tags: ["boot_recovery"]

# Enabled only — the staggered per-node systemd race (30/60/90s delays) is
# for unattended host reboots. Starting the unit on every node here made all
# three race each other: secondaries hit benign rejoin errors and failed the
# play, and deploys blocked through the full stagger delay for nothing.
- name: Enable boot recovery service for future reboots
  ansible.builtin.systemd:
    name: erawan-mysql-boot-recovery.service
    daemon_reload: true
    enabled: true
  tags: ["boot_recovery"]

# The watchdog fires every 60s on every node and does STOP GROUP_REPLICATION
# + rejoinInstance when its node isn't ONLINE — exactly the state every node
# is in during a cluster start. Left running, it races the primary's
# rebootClusterFromCompleteOutage for cluster metadata locks (observed: starts
# stalling to the 300s mysqlsh timeout). Pause it for the duration and always
# resume, even on failure, so a half-recovered cluster can still self-heal.
- name: Pause GR watchdog during recovery
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - erawan-gr-watchdog.timer
    - erawan-gr-watchdog.service
  failed_when: false
  tags: ["boot_recovery"]

- name: Run recovery with the watchdog paused
  tags: ["boot_recovery"]
  block:
    # On-demand recovery (deploy / start / recover): run the script once, from
    # the primary, with no stagger delay. reboot_cluster_from_complete_outage()
    # rejoins every reachable member itself; verify_cluster and the GR watchdog
    # pick up any straggler. If the cluster is already online the script exits
    # immediately, so on a fresh deploy this is a ~2s no-op.
    - name: Run cluster recovery from the primary
      ansible.builtin.command: /usr/local/bin/erawan-mysql-boot-recovery
      environment:
        BOOT_RECOVERY_DELAY_SECONDS: "0"
      when: inventory_hostname in groups['mysql_primary']
      changed_when: true
  always:
    - name: Resume GR watchdog
      ansible.builtin.systemd:
        name: erawan-gr-watchdog.timer
        state: started
      failed_when: false
