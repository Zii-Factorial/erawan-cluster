---
- name: Rollback mysqlrouter services
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Stop and disable mysqlrouter service
      ansible.builtin.systemd:
        name: "{{ router_service_name }}"
        state: stopped
        enabled: false
      failed_when: false
      tags: ["rollback"]

    - name: Remove mysqlrouter systemd service file
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ router_service_name }}.service"
        state: absent
      notify: reload systemd
      tags: ["rollback"]

    - name: Remove mysqlrouter directory
      ansible.builtin.file:
        path: "/etc/mysqlrouter/{{ cluster_name }}"
        state: absent
      tags: ["rollback"]

  handlers:
    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

- name: Dissolve cluster from primary
  hosts: mysql_primary
  gather_facts: false
  become: true
  tasks:
    - name: Dissolve InnoDB cluster if exists
      ansible.builtin.shell: |
        set -euo pipefail
        _tmp=$(mktemp /tmp/erawan-XXXXXX.py)
        trap 'rm -f "$_tmp"' EXIT
        cat >"$_tmp" <<'PY'
        import os

        shell.options["useWizards"] = False
        cluster_name = {{ cluster_name | to_json }}

        last_error = None
        for sock in ("/var/run/mysqld/mysqld.sock", "/run/mysqld/mysqld.sock", "/var/lib/mysql/mysql.sock"):
          if not os.path.exists(sock):
            continue
          try:
            shell.connect({"user": "root", "scheme": "mysql", "host": "localhost", "socket": sock})
            break
          except Exception as exc:
            last_error = exc
        else:
          if last_error is not None:
            raise last_error
          raise RuntimeError("unable to find a usable MySQL local socket for root")

        try:
          dba.get_cluster(cluster_name).dissolve({"force": True})
          print("cluster dissolved")
        except Exception as e:
          msg = str(e).lower()
          if any(t in msg for t in ("does not exist", "unknown cluster", "standalone instance")):
            print("cluster already absent")
          else:
            raise
        PY
        timeout {{ mysqlsh_rollback_timeout_seconds | default(180) | int }} \
          mysqlsh --no-wizard --py --file "$_tmp"
      args:
        executable: /bin/bash
      register: rollback_cluster
      changed_when: "'cluster dissolved' in rollback_cluster.stdout"
      tags: ["rollback"]
