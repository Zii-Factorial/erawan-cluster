---
# ---------------------------------------------------------------------------
# Site-wide defaults — override via extra vars (-e) or host_vars as needed.
# Required vars (cluster_name, primary_ip, postgres_superuser_password,
# replication_password, patroni_admin_password, deployment_job_id) must be
# provided at runtime.
# ---------------------------------------------------------------------------

# PostgreSQL
# postgres_port: 5432
# postgres_superuser: postgres
# postgresql_cluster_name: main

# Patroni
# patroni_rest_port: 8008
# patroni_namespace: /db/
# patroni_admin_user: admin

# etcd
# etcd_client_port: 2379
# etcd_peer_port: 2380

# App database (optional)
# new_user: ""
# new_db: ""
# new_user_password: ""
# new_user_ssl_required: true

# postgres_exporter — unlike postgres/patroni/etcd this has no distro package,
# so it must be pre-installed on the node image at this exact path. runtime_facts
# asserts it during preflight (Play 1) so a missing exporter fails fast instead
# of timing out deep into the deploy in the exporter-setup play.
postgres_exporter_bin: /usr/local/bin/postgres_exporter
# Defined here (not setup_exporters/defaults) so base_config's single UFW pass
# in Play 2 can open it too, instead of a second ufw-status round trip per node
# in the exporter-setup play.
postgres_exporter_port: 9187
