- name: Check whether PostgreSQL data reset already ran for this job
  ansible.builtin.stat:
    path: "{{ erawan_pg_reset_marker }}"
  register: erawan_pg_reset_marker_stat

- name: Reset PostgreSQL data directory once per deployment job
  ansible.builtin.shell: |
    set -euo pipefail
    mkdir -p "{{ erawan_pg_data_directory }}"
    find "{{ erawan_pg_data_directory }}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
    chown -R postgres:postgres "{{ erawan_pg_data_directory }}"
    chmod 700 "{{ erawan_pg_data_directory }}"
    install -o postgres -g postgres -m 0600 /dev/null "{{ erawan_pg_reset_marker }}"
  args:
    executable: /bin/bash
  when: not erawan_pg_reset_marker_stat.stat.exists

- name: Write Patroni configuration
  ansible.builtin.copy:
    dest: "{{ patroni_config_path }}"
    owner: postgres
    group: postgres
    mode: "0600"
    content: |
      scope: {{ patroni_scope }}
      namespace: {{ patroni_namespace }}
      name: {{ erawan_pg_node_name }}

      restapi:
        listen: {{ ansible_host }}:{{ patroni_rest_port }}
        connect_address: {{ ansible_host }}:{{ patroni_rest_port }}

      etcd:
        hosts:
      {% for host_name in groups['all'] %}
          - {{ hostvars[host_name].ansible_host }}:{{ etcd_client_port }}
      {% endfor %}

      bootstrap:
        dcs:
          ttl: 30
          loop_wait: 10
          retry_timeout: 10
          maximum_lag_on_failover: 1048576
          postgresql:
            use_pg_rewind: true
            use_slots: true
            parameters:
              wal_level: replica
              hot_standby: "on"
              max_wal_senders: 10
              max_replication_slots: 10
              wal_log_hints: "on"
        initdb:
          - encoding: UTF8
          - data-checksums
        pg_hba:
      {% if (new_user | default('') | string | length) > 0 and (new_db | default('') | string | length) > 0 %}
      {% if new_user_ssl_required | default(true) | bool %}
          - hostssl {{ new_db }} {{ new_user }} 0.0.0.0/0 md5
          - hostnossl {{ new_db }} {{ new_user }} 0.0.0.0/0 reject
      {% else %}
          - host {{ new_db }} {{ new_user }} 0.0.0.0/0 md5
      {% endif %}
      {% endif %}
          - host replication {{ replication_user }} 0.0.0.0/0 md5
          - host all all 0.0.0.0/0 md5
        users:
          {{ patroni_admin_user }}:
            password: {{ patroni_admin_password | to_json }}
            options:
              - createrole
              - createdb

      postgresql:
        listen: {{ ansible_host }}:{{ postgres_port }}
        connect_address: {{ ansible_host }}:{{ postgres_port }}
        data_dir: {{ erawan_pg_data_directory }}
        bin_dir: {{ erawan_pg_bindir }}
        pgpass: {{ patroni_pgpass_path }}
        authentication:
          replication:
            username: {{ replication_user }}
            password: {{ replication_password | to_json }}
          superuser:
            username: {{ postgres_superuser }}
            password: {{ postgres_superuser_password | to_json }}
        parameters:
          ssl: "on"
          ssl_cert_file: '/etc/ssl/certs/ssl-cert-snakeoil.pem'
          ssl_key_file: '/etc/ssl/private/ssl-cert-snakeoil.key'
          unix_socket_directories: '/var/run/postgresql'
        remove_data_directory_on_rewind_failure: true
        remove_data_directory_on_diverged_timelines: true

      tags:
        nofailover: false
        noloadbalance: false
        clonefrom: false
        nosync: false
