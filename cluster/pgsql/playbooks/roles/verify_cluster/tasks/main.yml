---
- name: Check etcd service is enabled
  ansible.builtin.command:
    argv: [systemctl, is-enabled, etcd]
  register: etcd_enabled
  changed_when: false
  failed_when: etcd_enabled.rc != 0
  tags: ["verify_cluster"]

- name: Check Patroni service is enabled
  ansible.builtin.command:
    argv: [systemctl, is-enabled, patroni]
  register: patroni_enabled
  changed_when: false
  failed_when: patroni_enabled.rc != 0
  tags: ["verify_cluster"]

- name: Check etcd is active
  ansible.builtin.command:
    argv: [systemctl, is-active, etcd]
  register: etcd_active
  changed_when: false
  failed_when: etcd_active.rc != 0
  tags: ["verify_cluster"]

- name: Check Patroni is active
  ansible.builtin.command:
    argv: [systemctl, is-active, patroni]
  register: patroni_active
  changed_when: false
  failed_when: patroni_active.rc != 0
  tags: ["verify_cluster"]

- name: Check local Patroni REST API
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ patroni_rest_port }}/patroni"
    return_content: true
  register: patroni_status
  changed_when: false
  failed_when: patroni_status.status != 200
  tags: ["verify_cluster"]

- name: Wait for all cluster nodes to be registered in Patroni
  ansible.builtin.uri:
    url: "http://{{ primary_ip }}:{{ patroni_rest_port }}/cluster"
    return_content: true
  register: patroni_cluster_view
  until:
    - patroni_cluster_view.status == 200
    - (patroni_cluster_view.json | default({})).members | default([]) | length >= (standby_ips | length + 1)
    - (patroni_cluster_view.json | default({})).members | default([]) | selectattr('role', 'equalto', 'leader') | list | length == 1
  # This is one of three sequential waits in this role that all run inside a
  # single ansible-playbook process governed by one process-level timeout
  # (step_timeout_seconds, enforced Go-side). Each used to be ceilinged at the
  # *full* step_timeout_seconds independently, so their worst cases summed to
  # 3x the actual budget: the process got killed mid-wait before the later
  # checks ever ran. Each now gets a 1/3 share so the combined worst case
  # fits the real budget; polled at 1s for fast detection on the happy path.
  retries: "{{ ((step_timeout_seconds | default(900) | int) / 3) | int }}"
  delay: 1
  changed_when: false
  run_once: true
  delegate_to: "{{ groups['pgsql_primary'][0] }}"
  tags: ["verify_cluster"]

- name: Wait for sync_standby to be elected
  ansible.builtin.uri:
    url: "http://{{ primary_ip }}:{{ patroni_rest_port }}/cluster"
    return_content: true
  register: _sync_check
  until: (_sync_check.json | default({})).members | default([]) | selectattr('role', 'equalto', 'sync_standby', 'streaming') | list | length > 0
  # 1/3 share of the process budget — see the comment on the previous wait.
  retries: "{{ ((step_timeout_seconds | default(900) | int) / 3) | int }}"
  delay: 1
  changed_when: false
  run_once: true
  delegate_to: "{{ groups['pgsql_primary'][0] }}"
  when: standby_ips | length > 0
  tags: ["verify_cluster"]

- name: Wait for expected replication connections on primary
  no_log: true
  ansible.builtin.shell: |
    set -euo pipefail
    psql -h {{ primary_ip }} -p {{ postgres_port }} -U {{ postgres_superuser }} -d postgres -Atqc "SELECT count(*) FROM pg_stat_replication;"
  args:
    executable: /bin/bash
  environment:
    PGPASSWORD: "{{ postgres_superuser_password }}"
  register: pgsql_replication_count
  changed_when: false
  until: pgsql_replication_count.stdout | int >= (standby_ips | length)
  # 1/3 share of the process budget, polled at 2s instead of 10s — see the
  # comment on the first wait above for why this is no longer a full share.
  retries: "{{ (((step_timeout_seconds | default(900) | int) / 3) / 2) | int }}"
  delay: 2
  run_once: true
  delegate_to: "{{ groups['pgsql_primary'][0] }}"
  tags: ["verify_cluster"]
