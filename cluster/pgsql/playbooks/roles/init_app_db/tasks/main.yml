---
- name: Initialize application database and user
  no_log: true
  vars:
    _superuser: "{{ new_user_superuser | default(true) | bool }}"
    _role_attrs: >-
      {{ 'LOGIN SUPERUSER CREATEDB CREATEROLE REPLICATION BYPASSRLS'
         if _superuser
         else 'LOGIN NOINHERIT NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION NOBYPASSRLS' }}
  ansible.builtin.shell: |
    set -euo pipefail
    psql -h {{ primary_ip }} -p {{ postgres_port }} -U {{ postgres_superuser }} -d postgres -v ON_ERROR_STOP=1 <<'SQL'
    DO $$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '{{ new_user }}') THEN
        EXECUTE format('CREATE ROLE %I WITH {{ _role_attrs }} PASSWORD %L', '{{ new_user }}', '{{ new_user_password | replace("'", "''") }}');
      ELSE
        EXECUTE format('ALTER ROLE %I WITH {{ _role_attrs }} PASSWORD %L', '{{ new_user }}', '{{ new_user_password | replace("'", "''") }}');
      END IF;
    END
    $$;

    SELECT format('CREATE DATABASE %I OWNER %I', '{{ new_db }}', '{{ new_user }}')
    WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = '{{ new_db }}') \gexec

    ALTER DATABASE "{{ new_db }}" OWNER TO "{{ new_user }}";
    GRANT ALL PRIVILEGES ON DATABASE "{{ new_db }}" TO "{{ new_user }}";
    SQL
  args:
    executable: /bin/bash
  environment:
    PGPASSWORD: "{{ postgres_superuser_password }}"
  changed_when: true
  when:
    - (new_user | default('') | string | length) > 0
    - (new_db | default('') | string | length) > 0
  tags: ["init_app_db"]
