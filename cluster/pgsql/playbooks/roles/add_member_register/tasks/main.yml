---
# The primary's etcd can be wedged by stale voting members: a standby that was
# destroyed without going through the remove-member API stays registered as a
# voter, and once live voters drop below quorum every linearizable call
# (endpoint health, member list, member add/remove) times out with
# "context deadline exceeded" / "unhealthy cluster". The cleanup further down
# can never run in that state, so detect it first with a serializable (local,
# quorum-free) member list and — only when it is provably safe — recover the
# primary with force-new-cluster before gating on cluster health.

- name: Probe etcd health on primary (non-fatal)
  ansible.builtin.shell: |
    set -euo pipefail
    etcdctl --endpoints="http://127.0.0.1:{{ etcd_client_port }}" endpoint health
  args:
    executable: /bin/bash
  register: _etcd_quick_health
  changed_when: false
  failed_when: false
  tags: ["add_member_register"]

# The control plane's view of the cluster (primary + current standbys + the
# member being added) is the source of truth for which etcd registrations are
# legitimate; anything else is a leftover from a destroyed node.
- name: Build expected cluster node list
  ansible.builtin.set_fact:
    _etcd_expected_ips: "{{ ([primary_ip] + (standby_ips | default([])) + [new_member_ip]) | unique }}"
  tags: ["add_member_register"]

- name: Recover etcd from quorum lost to stale members
  when: _etcd_quick_health.rc != 0
  tags: ["add_member_register"]
  block:
    # force-new-cluster resets membership to just the local node, so it is only
    # safe when every other registered voter is stale (not in the control
    # plane's node list) and demonstrably dead. Otherwise fail with guidance.
    # The member list is fetched serializable (linearizable=false) straight
    # from the local etcd JSON gateway: that read is served from local raft
    # state and works without quorum, unlike `etcdctl member list`.
    - name: Evaluate whether quorum loss is auto-recoverable
      ansible.builtin.shell: |
        set -euo pipefail
        python3 - <<'PYEOF'
        import json, os, sys, urllib.request

        expected = set(filter(None, os.environ['EXPECTED_IPS'].split(',')))
        primary_ip = os.environ['PRIMARY_IP']
        client_port = os.environ['ETCD_CLIENT_PORT']

        list_req = urllib.request.Request(
            'http://127.0.0.1:%s/v3/cluster/member/list' % client_port,
            data=b'{}',
            headers={'Content-Type': 'application/json'},
        )
        with urllib.request.urlopen(list_req, timeout=5) as resp:
            members = json.load(resp).get('members', [])

        def peer_ips(member):
            return {u.split('//', 1)[-1].rsplit(':', 1)[0] for u in member.get('peerURLs', [])}

        stale, expected_other_voters = [], []
        for m in members:
            ips = peer_ips(m)
            if ips & expected:
                if primary_ip not in ips and not m.get('isLearner', False):
                    expected_other_voters.append(sorted(ips))
            else:
                stale.append(sorted(ips))

        def verdict(recover, reason=''):
            print(json.dumps({'recover': recover, 'reason': reason, 'stale': stale}))
            sys.exit(0)

        if not stale:
            verdict(False, 'no stale members are registered; the quorum loss is a real outage of current cluster nodes -- recover those nodes instead')
        if expected_other_voters:
            verdict(False, 'current standbys %s are also registered as voters; force-new-cluster would orphan them -- repair them or run remove-member first' % expected_other_voters)
        for ips in stale:
            for ip in ips:
                try:
                    urllib.request.urlopen('http://%s:%s/health' % (ip, client_port), timeout=3)
                    verdict(False, 'stale member %s still answers on its etcd client port; stop etcd on it before recovery' % ip)
                except Exception:
                    pass
        verdict(True)
        PYEOF
      args:
        executable: /bin/bash
      environment:
        EXPECTED_IPS: "{{ _etcd_expected_ips | join(',') }}"
        PRIMARY_IP: "{{ primary_ip }}"
        ETCD_CLIENT_PORT: "{{ etcd_client_port | string }}"
      register: _etcd_recovery_decision
      changed_when: false

    - name: Abort when quorum loss is not auto-recoverable
      ansible.builtin.fail:
        msg: >-
          etcd on the primary has lost quorum and cannot be auto-recovered:
          {{ (_etcd_recovery_decision.stdout | from_json).reason }}
      when: not ((_etcd_recovery_decision.stdout | from_json).recover | bool)

    - name: Enable force-new-cluster in etcd config
      ansible.builtin.lineinfile:
        path: "{{ etcd_config_path }}"
        line: "force-new-cluster: true"
        state: present

    - name: Restart etcd to drop stale members and restore single-voter quorum
      ansible.builtin.systemd:
        name: etcd
        state: restarted

    - name: Wait for etcd to become healthy after force-new-cluster
      ansible.builtin.shell: |
        set -euo pipefail
        etcdctl --endpoints="http://127.0.0.1:{{ etcd_client_port }}" endpoint health
      args:
        executable: /bin/bash
      register: _etcd_forced_health
      changed_when: false
      until: _etcd_forced_health.rc == 0
      retries: 30
      delay: 2

    # Leaving force-new-cluster set would re-wipe membership on every etcd
    # restart, silently kicking out members added later. Remove it and restart
    # once more so the running process no longer carries the flag.
    - name: Remove force-new-cluster from etcd config
      ansible.builtin.lineinfile:
        path: "{{ etcd_config_path }}"
        line: "force-new-cluster: true"
        state: absent

    - name: Restart etcd without force-new-cluster
      ansible.builtin.systemd:
        name: etcd
        state: restarted

- name: Verify etcd is healthy on primary before registering new member
  ansible.builtin.shell: |
    set -euo pipefail
    etcdctl --endpoints="http://127.0.0.1:{{ etcd_client_port }}" endpoint health
  args:
    executable: /bin/bash
  register: _etcd_health_check
  changed_when: false
  until: _etcd_health_check.rc == 0
  # Same 30s ceiling, polled at 1s instead of 5s — the primary's etcd is
  # already up and running in the normal case.
  retries: 30
  delay: 1
  failed_when: _etcd_health_check.rc != 0
  tags: ["add_member_register"]

# Stale members (destroyed nodes that never went through the remove-member
# API) and unstarted members (name == "") from prior failed attempts cause
# "etcdserver: unhealthy cluster" on the next member add. Remove them before
# computing the peer list so they cannot leak into the new member's
# initial-cluster string.
- name: Remove stale and orphaned etcd members
  ansible.builtin.shell: |
    set -euo pipefail
    etcdctl \
      --endpoints="http://127.0.0.1:{{ etcd_client_port }}" \
      member list --write-out=json \
    | python3 -c "
    import json, os, sys, subprocess
    data = json.load(sys.stdin)
    expected = set(filter(None, os.environ['EXPECTED_IPS'].split(',')))
    removed = 0
    for m in data.get('members', []):
        peer_urls = m.get('peerURLs', [])
        if any('{{ new_member_ip }}' in url for url in peer_urls):
            continue  # this is our intended new member
        peer_ips = {u.split('//', 1)[-1].rsplit(':', 1)[0] for u in peer_urls}
        started = bool(m.get('name', '').strip())
        stale = bool(expected) and peer_ips.isdisjoint(expected)
        if started and not stale:
            continue  # healthy current member — leave it alone
        mid = format(m['ID'], 'x')
        print('removing %s member id=%s peers=%s' % ('stale' if stale else 'orphaned', mid, sorted(peer_ips)), flush=True)
        subprocess.run([
            'etcdctl',
            '--endpoints=http://127.0.0.1:{{ etcd_client_port }}',
            'member', 'remove', mid,
        ], check=True)
        removed += 1
    print('removed=' + str(removed), flush=True)
    "
  args:
    executable: /bin/bash
  environment:
    EXPECTED_IPS: "{{ _etcd_expected_ips | join(',') }}"
  register: _etcd_orphan_cleanup
  changed_when: "'removed=0' not in _etcd_orphan_cleanup.stdout"

- name: Retrieve current etcd member list
  ansible.builtin.shell: |
    set -euo pipefail
    etcdctl \
      --endpoints="http://127.0.0.1:{{ etcd_client_port }}" \
      member list --write-out=json
  args:
    executable: /bin/bash
  register: etcd_members_json
  changed_when: false
  # Same 25s ceiling, polled at 1s instead of 5s.
  retries: 25
  delay: 1
  until: etcd_members_json.rc == 0

- name: Parse existing etcd cluster peers
  ansible.builtin.set_fact:
    etcd_existing_peers: >-
      {{
        (etcd_members_json.stdout | from_json).members
        | map(attribute='peerURLs')
        | flatten
        | join(',')
      }}

- name: Check whether new member is already registered
  ansible.builtin.set_fact:
    etcd_member_already_registered: >-
      {{
        (etcd_members_json.stdout | from_json).members
        | selectattr('peerURLs', 'contains', 'http://' + new_member_ip + ':' + etcd_peer_port | string)
        | list | length > 0
      }}

# Use --learner so this works even on single-node clusters.
# Direct member add requires post-add quorum (e.g. 2 of 2) but a 1-node cluster
# only has 1 started member, so it always returns "unhealthy cluster".
# Learner registration skips the quorum gate, then we promote after the node syncs.
- name: Register new member in etcd cluster as learner
  ansible.builtin.shell: |
    set -euo pipefail
    etcdctl \
      --endpoints="http://127.0.0.1:{{ etcd_client_port }}" \
      member add new_member \
      --learner \
      --peer-urls="http://{{ new_member_ip }}:{{ etcd_peer_port }}"
  args:
    executable: /bin/bash
  when: not etcd_member_already_registered
  register: etcd_member_add

- name: Build initial cluster string for new member
  ansible.builtin.set_fact:
    etcd_initial_cluster_for_new_member: >-
      {{
        etcd_existing_peers + ',new_member=http://' + new_member_ip + ':' + etcd_peer_port | string
      }}
  when: not etcd_member_already_registered

- name: Use existing cluster peers when member already registered
  ansible.builtin.set_fact:
    etcd_initial_cluster_for_new_member: "{{ etcd_existing_peers }}"
  when: etcd_member_already_registered

- name: Export initial cluster string for new member
  ansible.builtin.set_fact:
    hostvars_etcd_initial_cluster: "{{ etcd_initial_cluster_for_new_member }}"
