---
- name: Rediscover PostgreSQL runtime facts
  ansible.builtin.import_role:
    name: runtime_facts
  tags: ["base_config"]

- name: Stop services before reconfiguration
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - patroni
    - etcd
    - "{{ erawan_pg_service_name }}"
  failed_when: false
  tags: ["base_config"]

- name: Disable versioned PostgreSQL service before Patroni takeover
  ansible.builtin.systemd:
    name: "{{ erawan_pg_service_name }}"
    enabled: false
  failed_when: false
  tags: ["base_config"]

- name: Mask wrapper PostgreSQL service
  ansible.builtin.systemd:
    name: postgresql.service
    masked: true
  failed_when: false
  tags: ["base_config"]

- name: Ensure configuration and runtime directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "/etc/etcd", owner: "root", group: "root", mode: "0755" }
    - { path: "/etc/patroni", owner: "postgres", group: "postgres", mode: "0755" }
    - { path: "/var/run/postgresql", owner: "postgres", group: "postgres", mode: "2775" }
  tags: ["base_config"]

- name: Ensure Patroni pgpass file exists
  ansible.builtin.file:
    path: "{{ patroni_pgpass_path }}"
    state: touch
    owner: postgres
    group: postgres
    mode: "0600"
  tags: ["base_config"]

- name: Install etcd configuration
  ansible.builtin.template:
    src: etcd.conf.j2
    dest: "{{ etcd_config_path }}"
    owner: root
    group: root
    mode: "0644"
  tags: ["base_config"]

- name: Install etcd systemd unit
  ansible.builtin.template:
    src: etcd.service.j2
    dest: /etc/systemd/system/etcd.service
    mode: "0644"
  notify: reload systemd
  tags: ["base_config"]

- name: Install Patroni systemd unit
  ansible.builtin.template:
    src: patroni.service.j2
    dest: /etc/systemd/system/patroni.service
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd
  tags: ["base_config"]

- name: Flush handlers to apply systemd unit changes
  ansible.builtin.meta: flush_handlers
  tags: ["base_config"]

- name: Ensure core services are enabled
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
  loop:
    - etcd
    - patroni
  tags: ["base_config"]
