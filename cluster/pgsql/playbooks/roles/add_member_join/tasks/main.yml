---
- name: Start etcd and join existing cluster as learner
  ansible.builtin.systemd:
    name: etcd
    enabled: true
    state: started

- name: Wait for local etcd to become healthy
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ etcd_client_port }}/health"
    return_content: true
  register: etcd_health
  until: etcd_health.status == 200 and ('true' in (etcd_health.content | lower))
  # Same 150s ceiling as cluster_bootstrap's etcd health check, just polled at
  # 1s instead of 5s so the (normal, fast) happy path isn't held up by a
  # coarse interval.
  retries: 150
  delay: 1
  changed_when: false

# Query the primary's etcd (which is always a voter) to find our own member ID.
# This is needed to promote ourselves from learner to voting member.
- name: Find own etcd member ID from primary
  ansible.builtin.shell: |
    set -euo pipefail
    etcdctl \
      --endpoints="http://{{ primary_ip }}:{{ etcd_client_port }}" \
      member list --write-out=json \
    | python3 -c "
    import json, sys
    data = json.load(sys.stdin)
    my_ip = '{{ ansible_host }}'
    for m in data.get('members', []):
        if any(my_ip in url for url in m.get('peerURLs', [])):
            print(format(m['ID'], 'x'))
            sys.exit(0)
    print('', end='')
    "
  args:
    executable: /bin/bash
  register: _etcd_own_id
  changed_when: false

- name: Check if this member is still a learner
  ansible.builtin.shell: |
    set -euo pipefail
    etcdctl \
      --endpoints="http://{{ primary_ip }}:{{ etcd_client_port }}" \
      member list --write-out=json \
    | python3 -c "
    import json, sys
    data = json.load(sys.stdin)
    my_ip = '{{ ansible_host }}'
    for m in data.get('members', []):
        if any(my_ip in url for url in m.get('peerURLs', [])):
            print('true' if m.get('isLearner', False) else 'false')
            sys.exit(0)
    print('false')
    "
  args:
    executable: /bin/bash
  register: _etcd_is_learner
  changed_when: false
  when: _etcd_own_id.stdout | trim != ''

# etcd refuses promotion until the learner has caught up to the leader's raft log.
# Retry up to 3 min — etcd itself enforces the sync check so there is no data-loss risk.
# Polled at 2s instead of 10s (same 180s ceiling) since the etcd metadata
# store is tiny and usually catches up in well under one interval.
- name: Promote learner to voting member
  ansible.builtin.shell: |
    set -euo pipefail
    etcdctl \
      --endpoints="http://{{ primary_ip }}:{{ etcd_client_port }}" \
      member promote {{ _etcd_own_id.stdout | trim }}
  args:
    executable: /bin/bash
  register: _etcd_promote
  until: _etcd_promote.rc == 0
  retries: 90
  delay: 2
  changed_when: _etcd_promote.rc == 0
  when:
    - _etcd_own_id.stdout | trim != ''
    - _etcd_is_learner.stdout | trim == 'true'

# The register play's leader gate only proves Patroni's REST API (8008) is
# up on the primary — NOT that PostgreSQL itself (5432) is reachable from
# this node, which is the path pg_basebackup actually uses. A primary whose
# live postmaster is bound to localhost (stock-image OS unit won the boot
# race after a scale recreated the VM) or firewalled passes that gate, and
# then every clone attempt silently fails: Patroni loops in "creating
# replica" returning 503 until the full replica-wait ceiling burns down.
# Probing the real clone path from the real source host fails in seconds
# with the actual cause instead.
- name: Verify the leader's PostgreSQL is reachable from this node
  tags: ["add_member_join"]
  block:
    - name: Probe leader PostgreSQL port from the new member
      ansible.builtin.wait_for:
        host: "{{ primary_ip }}"
        port: "{{ postgres_port }}"
        state: started
        timeout: 30
  rescue:
    - name: Fail fast because the clone source is unreachable
      ansible.builtin.fail:
        msg: >-
          PostgreSQL on the leader ({{ primary_ip }}:{{ postgres_port }}) is
          not reachable from the new member {{ ansible_host }}, so replica
          creation (pg_basebackup) cannot work. Patroni's REST API on the
          leader is up, so the usual cause is the leader's live postmaster
          listening on localhost only (OS-packaged postgresql unit won the
          boot race after the node was rebooted/recreated — run the
          start/recover API for this cluster to re-disarm it) or a firewall
          blocking {{ postgres_port }} between the nodes.

- name: Start Patroni and join cluster as standby
  ansible.builtin.systemd:
    name: patroni
    enabled: true
    state: started

# block/rescue mirrors cluster_bootstrap: when the join fails (basebackup
# auth error, primary unreachable, timeout on a large dataset), surface the
# Patroni journal — which contains the pg_basebackup error — instead of a
# bare 503 from the /replica probe.
- name: Join cluster as replica and verify streaming state
  block:
    - name: Wait for Patroni REST port to open
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ patroni_rest_port }}"
        state: started
        timeout: 300

    - name: Wait for node to reach replica state
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:{{ patroni_rest_port }}/replica"
        return_content: true
      register: _patroni_replica
      until: _patroni_replica.status == 200
      # Replica creation is a full pg_basebackup from the leader, so the time
      # this needs scales with data size. Bound it by step_timeout_seconds
      # (like verify_cluster's waits) instead of a hardcoded 300s that a
      # multi-GB dataset can legitimately exceed; 2s polling keeps the happy
      # path fast.
      retries: "{{ ((step_timeout_seconds | default(900) | int) / 2) | int }}"
      delay: 2
      changed_when: false
  rescue:
    - name: Collect Patroni journal on replica join failure
      ansible.builtin.command:
        argv: [journalctl, -u, patroni, --no-pager, -n, 100]
      register: _join_journal
      changed_when: false
      failed_when: false

    - name: Fail with replica join log context
      ansible.builtin.fail:
        msg: |
          New member {{ ansible_host }} did not reach replica state
          (last Patroni state: {{ (_patroni_replica.json | default({})).state | default('unknown') }}).
          Last 100 Patroni journal lines:
          {{ _join_journal.stdout | default('(no journal output)') }}
