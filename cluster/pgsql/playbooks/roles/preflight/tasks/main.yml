---
# The connection test is SSH + sudo -n + remote Python (become is set at the
# play level), so on a freshly provisioned VM it keeps polling until
# cloud-init has finished creating the user, sudoers entry, and interpreter
# — not just until sshd answers. The ceiling is sized for a node created
# seconds ago (scale flows recreate VMs from a stock image); polled at 2s so
# an already-reachable node is detected immediately. On timeout, the rescue
# distinguishes WHICH layer never came up instead of a bare "timed out".
- name: Wait for the node to become manageable
  tags: ["preflight"]
  block:
    - name: Wait for SSH connection and privilege escalation
      ansible.builtin.wait_for_connection:
        timeout: "{{ preflight_connect_timeout_seconds | default(300) }}"
        sleep: 2
  rescue:
    - name: Probe SSH and sudo layers separately
      ansible.builtin.raw: whoami && { sudo -n true && echo SUDO_OK || echo SUDO_FAIL; }
      become: false
      register: _preflight_probe
      changed_when: false
      failed_when: false

    - name: Fail with connection diagnosis
      ansible.builtin.fail:
        msg: >-
          {% if _preflight_probe.rc != 0 -%}
          Node {{ ansible_host }} is not reachable over SSH as
          {{ ansible_user | default('the configured user') }}:
          {{ _preflight_probe.stderr | default('') | trim }}
          {%- elif 'SUDO_FAIL' in (_preflight_probe.stdout | default('')) -%}
          SSH to {{ ansible_host }} works but passwordless sudo is not
          configured for the connecting user — node provisioning
          (cloud-init) is likely incomplete or misconfigured.
          {%- else -%}
          SSH and sudo work on {{ ansible_host }} but the Ansible Python
          test never succeeded — check that python3 is installed on the node.
          {%- endif %}

- name: Detect PostgreSQL runtime facts
  ansible.builtin.import_role:
    name: runtime_facts
  tags: ["preflight"]
