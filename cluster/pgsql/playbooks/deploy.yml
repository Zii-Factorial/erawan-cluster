---
# ---------------------------------------------------------------------------
# PLAY 1 — Preflight checks
# ---------------------------------------------------------------------------
- name: PostgreSQL cluster preflight
  hosts: all
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - preflight

# ---------------------------------------------------------------------------
# PLAY 2 — Base configuration (etcd + Patroni units, directories)
# ---------------------------------------------------------------------------
- name: PostgreSQL cluster base configuration
  hosts: all
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - base_config

# ---------------------------------------------------------------------------
# PLAY 3 — Write Patroni config on primary
# ---------------------------------------------------------------------------
- name: PostgreSQL primary node configuration
  hosts: pgsql_primary
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - role: configure_node
      tags: ["primary_config"]

# ---------------------------------------------------------------------------
# PLAY 4 — Write Patroni config on standbys
# ---------------------------------------------------------------------------
- name: PostgreSQL standby node configuration
  hosts: pgsql_standby
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - role: configure_node
      tags: ["standby_config"]

# ---------------------------------------------------------------------------
# PLAY 5 — Bootstrap cluster (etcd + Patroni startup, leader election)
# ---------------------------------------------------------------------------
- name: PostgreSQL cluster bootstrap
  hosts: all
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - cluster_bootstrap

# ---------------------------------------------------------------------------
# PLAY 6 — Verify cluster health
# ---------------------------------------------------------------------------
- name: PostgreSQL cluster final verification
  hosts: all
  gather_facts: false
  become: true
  any_errors_fatal: true
  roles:
    - verify_cluster

# ---------------------------------------------------------------------------
# PLAY 7 — Initialize application database (optional)
# ---------------------------------------------------------------------------
- name: PostgreSQL application database initialization
  hosts: pgsql_primary
  gather_facts: false
  become: true
  roles:
    - init_app_db
