<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 820" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="p-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8891a0"/></marker>
  </defs>
  <rect x="0" y="0" width="1500" height="820" fill="#0d1117"/>
  <text x="750" y="38" text-anchor="middle" font-size="21" font-weight="600" fill="#f5f5f9">PostgreSQL Cluster (Patroni + etcd) — Process Flow</text>

  <!-- ============ DEPLOY ============ -->
  <text x="250" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#34d399">DEPLOY</text>
  <rect x="90" y="100" width="320" height="34" rx="17" fill="#0f2620" stroke="#34d399" stroke-width="1.5"/>
  <text x="250" y="122" text-anchor="middle" font-size="12" fill="#8ff0ce">POST /cluster/pgsql/deploy</text>

  <rect x="90" y="162" width="320" height="50" rx="6" fill="#101820" stroke="#34d399" stroke-width="1.2"/>
  <text x="250" y="184" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Preflight checks</text>
  <text x="250" y="202" text-anchor="middle" font-size="10" fill="#7fbfa4">all nodes</text>

  <rect x="90" y="230" width="320" height="50" rx="6" fill="#101820" stroke="#34d399" stroke-width="1.2"/>
  <text x="250" y="252" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Base configuration</text>
  <text x="250" y="270" text-anchor="middle" font-size="10" fill="#7fbfa4">etcd + patroni systemd units</text>

  <rect x="90" y="298" width="320" height="50" rx="6" fill="#101820" stroke="#34d399" stroke-width="1.2"/>
  <text x="250" y="320" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Node configuration</text>
  <text x="250" y="338" text-anchor="middle" font-size="10" fill="#7fbfa4">patroni.yml per node</text>

  <rect x="90" y="366" width="320" height="50" rx="6" fill="#101820" stroke="#34d399" stroke-width="1.2"/>
  <text x="250" y="388" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Cluster bootstrap</text>
  <text x="250" y="406" text-anchor="middle" font-size="10" fill="#7fbfa4">first node initdb · others join via DCS</text>

  <rect x="90" y="434" width="320" height="50" rx="6" fill="#101820" stroke="#34d399" stroke-width="1.2"/>
  <text x="250" y="456" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Verify cluster</text>
  <text x="250" y="474" text-anchor="middle" font-size="10" fill="#7fbfa4">Patroni /cluster · all members healthy</text>

  <rect x="90" y="502" width="320" height="50" rx="6" fill="#101820" stroke="#34d399" stroke-width="1.2"/>
  <text x="250" y="524" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">App database + user</text>
  <text x="250" y="542" text-anchor="middle" font-size="10" fill="#7fbfa4">optional</text>

  <rect x="130" y="580" width="240" height="34" rx="17" fill="#0f2620" stroke="#34d399" stroke-width="1.5"/>
  <text x="250" y="602" text-anchor="middle" font-size="12" font-weight="600" fill="#8ff0ce">job completed</text>

  <line x1="250" y1="134" x2="250" y2="162" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <line x1="250" y1="212" x2="250" y2="230" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <line x1="250" y1="280" x2="250" y2="298" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <line x1="250" y1="348" x2="250" y2="366" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <line x1="250" y1="416" x2="250" y2="434" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <line x1="250" y1="484" x2="250" y2="502" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <line x1="250" y1="552" x2="250" y2="580" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>

  <!-- ============ STOP ============ -->
  <text x="750" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#f87171">STOP</text>
  <rect x="590" y="100" width="320" height="34" rx="17" fill="#2a1416" stroke="#f87171" stroke-width="1.5"/>
  <text x="750" y="122" text-anchor="middle" font-size="12" fill="#f5b8b8">POST /cluster/pgsql/stop</text>

  <rect x="590" y="162" width="320" height="50" rx="6" fill="#1c1014" stroke="#f87171" stroke-width="1.2"/>
  <text x="750" y="184" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Stop Patroni on standbys</text>
  <text x="750" y="202" text-anchor="middle" font-size="10" fill="#d99a9a">leader keeps serving</text>

  <rect x="590" y="230" width="320" height="50" rx="6" fill="#1c1014" stroke="#f87171" stroke-width="1.2"/>
  <text x="750" y="252" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Stop Patroni on primary</text>
  <text x="750" y="270" text-anchor="middle" font-size="10" fill="#d99a9a">clean shutdown · WAL flushed</text>

  <rect x="590" y="298" width="320" height="50" rx="6" fill="#1c1014" stroke="#f87171" stroke-width="1.2"/>
  <text x="750" y="320" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Force-stop lingering postgres</text>
  <text x="750" y="338" text-anchor="middle" font-size="10" fill="#d99a9a">safety net · all nodes</text>

  <rect x="590" y="366" width="320" height="50" rx="6" fill="#1c1014" stroke="#f87171" stroke-width="1.2"/>
  <text x="750" y="388" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Stop etcd</text>
  <text x="750" y="406" text-anchor="middle" font-size="10" fill="#d99a9a">all nodes · after everything is down</text>

  <rect x="630" y="434" width="240" height="34" rx="17" fill="#2a1416" stroke="#f87171" stroke-width="1.5"/>
  <text x="750" y="456" text-anchor="middle" font-size="12" font-weight="600" fill="#f5b8b8">cluster stopped · data intact</text>

  <line x1="750" y1="134" x2="750" y2="162" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <line x1="750" y1="212" x2="750" y2="230" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <line x1="750" y1="280" x2="750" y2="298" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <line x1="750" y1="348" x2="750" y2="366" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <line x1="750" y1="416" x2="750" y2="434" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>

  <!-- ============ START / RECOVER ============ -->
  <text x="1250" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#a78bfa">START / RECOVER</text>
  <rect x="1090" y="100" width="320" height="34" rx="17" fill="#1a1526" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="1250" y="122" text-anchor="middle" font-size="12" fill="#c3aef0">POST /cluster/pgsql/start · /recover</text>

  <rect x="1090" y="162" width="320" height="50" rx="6" fill="#151020" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="1250" y="184" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Start etcd, then Patroni</text>
  <text x="1250" y="202" text-anchor="middle" font-size="10" fill="#ab97d6">all nodes · existing data</text>

  <rect x="1090" y="230" width="320" height="50" rx="6" fill="#151020" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="1250" y="252" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Patroni starts postgres</text>
  <text x="1250" y="270" text-anchor="middle" font-size="10" fill="#ab97d6">leader election · replicas rejoin via DCS</text>

  <line x1="1250" y1="134" x2="1250" y2="162" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <line x1="1250" y1="212" x2="1250" y2="230" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <line x1="1250" y1="280" x2="1250" y2="318" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>

  <!-- decision -->
  <polygon points="1250,318 1400,388 1250,458 1100,388" fill="#151020" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="1250" y="382" text-anchor="middle" font-size="12" font-weight="600" fill="#f5f5f9">cluster healthy?</text>
  <text x="1250" y="400" text-anchor="middle" font-size="10" fill="#ab97d6">Patroni /cluster · retries with delay</text>

  <path d="M1250,458 V490 H1160 V520" fill="none" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <text x="1180" y="484" font-size="10.5" fill="#34d399">yes</text>
  <path d="M1250,458 V490 H1340 V520" fill="none" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-a)"/>
  <text x="1306" y="484" font-size="10.5" fill="#f87171">no, retries exhausted</text>

  <rect x="1074" y="520" width="172" height="34" rx="17" fill="#0f2620" stroke="#34d399" stroke-width="1.5"/>
  <text x="1160" y="542" text-anchor="middle" font-size="12" font-weight="600" fill="#8ff0ce">job completed</text>

  <rect x="1254" y="520" width="172" height="34" rx="17" fill="#2a1416" stroke="#f87171" stroke-width="1.5"/>
  <text x="1340" y="542" text-anchor="middle" font-size="12" font-weight="600" fill="#f5b8b8">job failed</text>

  <text x="1250" y="600" text-anchor="middle" font-size="10.5" fill="#7c8a9e">data directories are never touched · a destroyed node</text>
  <text x="1250" y="616" text-anchor="middle" font-size="10.5" fill="#7c8a9e">is not rebuilt — use add-member for that</text>
</svg>
