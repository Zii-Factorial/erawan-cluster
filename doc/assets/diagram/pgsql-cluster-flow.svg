<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 950" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="p-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8891a0"/></marker>
  </defs>
  <rect x="0" y="0" width="1560" height="950" fill="#0d1117"/>
  <text x="780" y="36" text-anchor="middle" font-size="22" font-weight="600" fill="#f5f5f9">PostgreSQL Cluster (Patroni + etcd) — Process Flow</text>
  <text x="780" y="58" text-anchor="middle" font-size="13" fill="#9aa4b2">Deploy · Stop · Start/Recover, as executed by the Go API + Ansible today</text>

  <!-- ===================== LANE 1: DEPLOY ===================== -->
  <rect x="40" y="86" width="440" height="10" fill="#34d399"/>
  <text x="40" y="112" font-size="15" font-weight="700" fill="#34d399">DEPLOY</text>
  <text x="40" y="128" font-size="10.5" fill="#7c8a9e">POST /cluster/pgsql/deploy</text>

  <rect x="40" y="140" width="440" height="64" rx="7" fill="#0f2620" stroke="#34d399" stroke-width="1.3"/>
  <text x="54" y="160" font-size="12.5" font-weight="600" fill="#f5f5f9">1 · Preflight checks</text>
  <text x="54" y="178" font-size="10.5" fill="#a9d9c4">psql/patroni/etcd binaries present, connectivity,</text>
  <text x="54" y="194" font-size="10.5" fill="#a9d9c4">disk space (all nodes, parallel)</text>

  <rect x="40" y="220" width="440" height="64" rx="7" fill="#0f2620" stroke="#34d399" stroke-width="1.3"/>
  <text x="54" y="240" font-size="12.5" font-weight="600" fill="#f5f5f9">2 · Base configuration</text>
  <text x="54" y="258" font-size="10.5" fill="#a9d9c4">mask default postgresql.service, write etcd.conf,</text>
  <text x="54" y="274" font-size="10.5" fill="#a9d9c4">install patroni/etcd systemd units (all nodes)</text>

  <rect x="40" y="300" width="440" height="64" rx="7" fill="#0f2620" stroke="#34d399" stroke-width="1.3"/>
  <text x="54" y="320" font-size="12.5" font-weight="600" fill="#f5f5f9">3 · Node configuration</text>
  <text x="54" y="338" font-size="10.5" fill="#a9d9c4">render per-node patroni.yml (DCS, replication,</text>
  <text x="54" y="354" font-size="10.5" fill="#a9d9c4">bootstrap params, pg_hba rules)</text>

  <rect x="40" y="380" width="440" height="64" rx="7" fill="#0f2620" stroke="#34d399" stroke-width="1.3"/>
  <text x="54" y="400" font-size="12.5" font-weight="600" fill="#f5f5f9">4 · Cluster bootstrap</text>
  <text x="54" y="418" font-size="10.5" fill="#a9d9c4">start etcd + patroni everywhere; first node bootstraps</text>
  <text x="54" y="434" font-size="10.5" fill="#a9d9c4">via initdb, others join as replicas through Patroni/DCS</text>

  <rect x="40" y="460" width="440" height="64" rx="7" fill="#0f2620" stroke="#34d399" stroke-width="1.3"/>
  <text x="54" y="480" font-size="12.5" font-weight="600" fill="#f5f5f9">5 · Verification</text>
  <text x="54" y="498" font-size="10.5" fill="#a9d9c4">poll Patroni /cluster until N members report</text>
  <text x="54" y="514" font-size="10.5" fill="#a9d9c4">running/streaming</text>

  <rect x="40" y="540" width="440" height="64" rx="7" fill="#0f2620" stroke="#34d399" stroke-width="1.3"/>
  <text x="54" y="560" font-size="12.5" font-weight="600" fill="#f5f5f9">6 · App database + user (optional)</text>
  <text x="54" y="578" font-size="10.5" fill="#a9d9c4">create new_db / new_user against the leader if</text>
  <text x="54" y="594" font-size="10.5" fill="#a9d9c4">requested in the deploy request</text>

  <line x1="260" y1="204" x2="260" y2="220" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-arrow)"/>
  <line x1="260" y1="284" x2="260" y2="300" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-arrow)"/>
  <line x1="260" y1="364" x2="260" y2="380" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-arrow)"/>
  <line x1="260" y1="444" x2="260" y2="460" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-arrow)"/>
  <line x1="260" y1="524" x2="260" y2="540" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-arrow)"/>

  <rect x="40" y="706" width="440" height="90" rx="7" fill="#171a22" stroke="#3a4150" stroke-width="1"/>
  <text x="54" y="726" font-size="12" font-weight="600" fill="#e2e6eb">Tech stack per node</text>
  <text x="54" y="744" font-size="10.5" fill="#9aa4b2">postgres :5432 (managed by Patroni via pg_ctl, not</text>
  <text x="54" y="760" font-size="10.5" fill="#9aa4b2">systemd) · Patroni REST :8008 · etcd :2379/2380</text>
  <text x="54" y="776" font-size="10.5" fill="#9aa4b2">· postgres_exporter :9187 · node_exporter :9100</text>

  <rect x="40" y="810" width="440" height="66" rx="7" fill="#0b1a14" stroke="#34d399" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="54" y="832" font-size="12" font-weight="600" fill="#8ff0ce">Outcome</text>
  <text x="54" y="850" font-size="10.5" fill="#a9d9c4">Job status=completed only if every step succeeds;</text>
  <text x="54" y="866" font-size="10.5" fill="#a9d9c4">resumable via /jobs/{id}/resume on failure</text>

  <!-- ===================== LANE 2: STOP ===================== -->
  <rect x="540" y="86" width="440" height="10" fill="#f87171"/>
  <text x="540" y="112" font-size="15" font-weight="700" fill="#f87171">STOP</text>
  <text x="540" y="128" font-size="10.5" fill="#7c8a9e">POST /cluster/pgsql/stop</text>

  <rect x="540" y="140" width="440" height="64" rx="7" fill="#2a1416" stroke="#f87171" stroke-width="1.3"/>
  <text x="554" y="160" font-size="12.5" font-weight="600" fill="#f5f5f9">1 · Stop Patroni on standbys first</text>
  <text x="554" y="178" font-size="10.5" fill="#f0b3b3">systemctl stop patroni (hosts: pgsql_standby)</text>
  <text x="554" y="194" font-size="10.5" fill="#f0b3b3">primary keeps serving while this runs</text>

  <rect x="540" y="220" width="440" height="64" rx="7" fill="#2a1416" stroke="#f87171" stroke-width="1.3"/>
  <text x="554" y="240" font-size="12.5" font-weight="600" fill="#f5f5f9">2 · Stop Patroni on the primary</text>
  <text x="554" y="258" font-size="10.5" fill="#f0b3b3">systemctl stop patroni (hosts: pgsql_primary) —</text>
  <text x="554" y="274" font-size="10.5" fill="#f0b3b3">intended to cleanly stop postgres underneath it</text>

  <rect x="540" y="300" width="440" height="74" rx="7" fill="#171f2a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="554" y="320" font-size="12.5" font-weight="600" fill="#f5f5f9">3 · Force-stop any lingering postgres</text>
  <rect x="882" y="304" width="46" height="18" rx="9" fill="#f59e0b"/>
  <text x="905" y="317" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1a1206">FIXED</text>
  <text x="554" y="338" font-size="10.5" fill="#ffd48a">pg_lsclusters + pg_ctlcluster stop -m fast on every</text>
  <text x="554" y="354" font-size="10.5" fill="#ffd48a">node (hosts: all) — belt-and-suspenders safety net</text>
  <text x="554" y="368" font-size="10.5" fill="#ffd48a">before Patroni's own shutdown is fully trusted</text>

  <rect x="540" y="390" width="440" height="64" rx="7" fill="#2a1416" stroke="#f87171" stroke-width="1.3"/>
  <text x="554" y="410" font-size="12.5" font-weight="600" fill="#f5f5f9">4 · Stop etcd on all nodes</text>
  <text x="554" y="428" font-size="10.5" fill="#f0b3b3">only after every Patroni/postgres is confirmed down —</text>
  <text x="554" y="444" font-size="10.5" fill="#f0b3b3">avoids a lost DCS session mid-shutdown</text>

  <line x1="760" y1="204" x2="760" y2="220" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-arrow)"/>
  <line x1="760" y1="284" x2="760" y2="300" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-arrow)"/>
  <line x1="760" y1="374" x2="760" y2="390" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-arrow)"/>

  <rect x="540" y="474" width="440" height="120" rx="7" fill="#2a1416" stroke="#f87171" stroke-width="1.3"/>
  <text x="554" y="494" font-size="12" font-weight="600" fill="#f5b8b8">Root cause found this session</text>
  <text x="554" y="512" font-size="10.5" fill="#f0b3b3">A node was observed with postgres still running 15+</text>
  <text x="554" y="528" font-size="10.5" fill="#f0b3b3">minutes after /stop — Patroni's systemd stop doesn't</text>
  <text x="554" y="544" font-size="10.5" fill="#f0b3b3">always finish stopping postgres underneath it in time</text>
  <text x="554" y="560" font-size="10.5" fill="#f0b3b3">(e.g. systemd TimeoutSec expiring mid-checkpoint kills</text>
  <text x="554" y="576" font-size="10.5" fill="#f0b3b3">only the Patroni process, orphaning postgres). Step 3 fixes it.</text>

  <rect x="540" y="614" width="440" height="80" rx="7" fill="#0b1a14" stroke="#f87171" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="554" y="636" font-size="12" font-weight="600" fill="#f5b8b8">Outcome</text>
  <text x="554" y="654" font-size="10.5" fill="#f0b3b3">postgres, Patroni and etcd all confirmed down on every</text>
  <text x="554" y="670" font-size="10.5" fill="#f0b3b3">node. Data directories untouched. Services stay enabled —</text>
  <text x="554" y="686" font-size="10.5" fill="#f0b3b3">use /start, not a raw reboot, to bring the cluster back.</text>

  <!-- ===================== LANE 3: START / RECOVER ===================== -->
  <rect x="1040" y="86" width="440" height="10" fill="#a78bfa"/>
  <text x="1040" y="112" font-size="15" font-weight="700" fill="#a78bfa">START / RECOVER</text>
  <text x="1040" y="128" font-size="10.5" fill="#7c8a9e">POST /cluster/pgsql/start  (alias of /recover)</text>

  <rect x="1040" y="140" width="440" height="128" rx="7" fill="#1a1526" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="1054" y="160" font-size="12.5" font-weight="600" fill="#f5f5f9">1 · cluster_bootstrap (re-run, idempotent)</text>
  <text x="1054" y="180" font-size="10.5" fill="#c3aef0">· systemctl start etcd, then patroni, on every node</text>
  <text x="1054" y="198" font-size="10.5" fill="#c3aef0">· Patroni starts postgres itself via pg_ctl against the</text>
  <text x="1054" y="214" font-size="10.5" fill="#c3aef0">  existing data directory (data is never touched)</text>
  <text x="1054" y="232" font-size="10.5" fill="#c3aef0">· nodes re-register in the DCS and rejoin as replicas;</text>
  <text x="1054" y="248" font-size="10.5" fill="#c3aef0">  no separate "reboot from outage" call needed</text>

  <rect x="1040" y="298" width="440" height="128" rx="7" fill="#1a1526" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="1054" y="318" font-size="12.5" font-weight="600" fill="#f5f5f9">2 · verify_cluster — confirm all healthy</text>
  <text x="1054" y="338" font-size="10.5" fill="#c3aef0">dba.get_cluster equivalent: query Patroni /cluster,</text>
  <text x="1054" y="354" font-size="10.5" fill="#c3aef0">require rs_status startswith "OK" and len(online) ==</text>
  <text x="1054" y="370" font-size="10.5" fill="#c3aef0">expected_nodes</text>
  <text x="1054" y="390" font-size="10.5" fill="#cdd6e0">retries + delay already built in — this step already</text>
  <text x="1054" y="406" font-size="10.5" fill="#cdd6e0">existed and worked correctly before this session</text>

  <line x1="1260" y1="268" x2="1260" y2="298" stroke="#8891a0" stroke-width="1.5" marker-end="url(#p-arrow)"/>

  <rect x="1040" y="456" width="440" height="92" rx="7" fill="#171a22" stroke="#3a4150" stroke-width="1"/>
  <text x="1054" y="476" font-size="12" font-weight="600" fill="#e2e6eb">Contrast with MySQL</text>
  <text x="1054" y="494" font-size="10.5" fill="#9aa4b2">Unlike MySQL's boot_recovery role (which needed a fix</text>
  <text x="1054" y="510" font-size="10.5" fill="#9aa4b2">this session), pgsql's start/recover already ran its steps</text>
  <text x="1054" y="526" font-size="10.5" fill="#9aa4b2">synchronously with verification — no equivalent gap found.</text>

  <rect x="1040" y="566" width="440" height="66" rx="7" fill="#0b1a14" stroke="#a78bfa" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="1054" y="588" font-size="12" font-weight="600" fill="#cbb6f5">Outcome</text>
  <text x="1054" y="606" font-size="10.5" fill="#c3aef0">Job status=completed only once verify_cluster confirms</text>
  <text x="1054" y="622" font-size="10.5" fill="#c3aef0">every expected member is healthy.</text>

  <rect x="1040" y="652" width="440" height="90" rx="7" fill="#171a22" stroke="#3a4150" stroke-width="1"/>
  <text x="1054" y="672" font-size="12" font-weight="600" fill="#e2e6eb">What recover does NOT do</text>
  <text x="1054" y="690" font-size="10.5" fill="#9aa4b2">Never touches data directories (postgres or etcd) and never</text>
  <text x="1054" y="706" font-size="10.5" fill="#9aa4b2">rebuilds a destroyed node — the same VM/disk must come back.</text>
  <text x="1054" y="722" font-size="10.5" fill="#9aa4b2">Use add-member to replace a lost node.</text>

  <text x="780" y="915" text-anchor="middle" font-size="10.5" fill="#7c8a9e">Sources: cluster/pgsql/playbooks/*.yml, internal/cluster/pgsql/service.go, doc/pgsql.md</text>
</svg>
