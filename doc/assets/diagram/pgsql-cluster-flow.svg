<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 944" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="m-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8891a0"/></marker>
  </defs>
  <rect x="0" y="0" width="1500" height="944" fill="#0d1117"/>
  <text x="750" y="38" text-anchor="middle" font-size="21" font-weight="600" fill="#f5f5f9">PostgreSQL Cluster (Patroni + etcd) — Process Flow</text>
  <text x="250" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#34d399">DEPLOY</text>
  <rect x="90" y="100" width="320" height="34" rx="17" fill="#0f2620" stroke="#34d399" stroke-width="1.5"/>
  <text x="250" y="121" text-anchor="middle" font-size="12" font-weight="600" fill="#8ff0ce">POST /cluster/pgsql/deploy</text>
  <line x1="250.0" y1="134" x2="250.0" y2="162" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="90" y="162" width="320" height="50" rx="6" fill="#101820" stroke="#34d399" stroke-width="1.2"/>
  <text x="250" y="184" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Preflight checks</text>
  <text x="250" y="202" text-anchor="middle" font-size="10" fill="#7fbfa4">all nodes · postgres_exporter binary required</text>
  <line x1="250.0" y1="212" x2="250.0" y2="230" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="90" y="230" width="320" height="50" rx="6" fill="#101820" stroke="#34d399" stroke-width="1.2"/>
  <text x="250" y="252" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Base configuration</text>
  <text x="250" y="270" text-anchor="middle" font-size="10" fill="#7fbfa4">etcd + patroni systemd units</text>
  <line x1="250.0" y1="280" x2="250.0" y2="298" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="90" y="298" width="320" height="50" rx="6" fill="#101820" stroke="#34d399" stroke-width="1.2"/>
  <text x="250" y="320" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Node configuration</text>
  <text x="250" y="338" text-anchor="middle" font-size="10" fill="#7fbfa4">patroni.yml per node</text>
  <line x1="250.0" y1="348" x2="250.0" y2="366" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="90" y="366" width="320" height="50" rx="6" fill="#101820" stroke="#34d399" stroke-width="1.2"/>
  <text x="250" y="388" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Cluster bootstrap</text>
  <text x="250" y="406" text-anchor="middle" font-size="10" fill="#7fbfa4">first node initdb · others join via DCS</text>
  <line x1="250.0" y1="416" x2="250.0" y2="434" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="90" y="434" width="320" height="50" rx="6" fill="#101820" stroke="#34d399" stroke-width="1.2"/>
  <text x="250" y="456" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Verify cluster</text>
  <text x="250" y="474" text-anchor="middle" font-size="10" fill="#7fbfa4">Patroni /cluster · all members healthy</text>
  <line x1="250.0" y1="484" x2="250.0" y2="502" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="90" y="502" width="320" height="50" rx="6" fill="#101820" stroke="#34d399" stroke-width="1.2"/>
  <text x="250" y="524" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">App database + user</text>
  <text x="250" y="542" text-anchor="middle" font-size="10" fill="#7fbfa4">optional</text>
  <line x1="250.0" y1="552" x2="250.0" y2="584" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="130" y="584" width="240" height="34" rx="17" fill="#0f2620" stroke="#34d399" stroke-width="1.5"/>
  <text x="250" y="605" text-anchor="middle" font-size="12" font-weight="600" fill="#8ff0ce">job completed</text>
  <text x="750" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#f87171">STOP</text>
  <rect x="590" y="100" width="320" height="34" rx="17" fill="#2a1416" stroke="#f87171" stroke-width="1.5"/>
  <text x="750" y="121" text-anchor="middle" font-size="12" font-weight="600" fill="#f5b8b8">POST /cluster/pgsql/stop</text>
  <line x1="750.0" y1="134" x2="750.0" y2="162" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="590" y="162" width="320" height="50" rx="6" fill="#1c1014" stroke="#f87171" stroke-width="1.2"/>
  <text x="750" y="184" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Stop Patroni on standbys</text>
  <text x="750" y="202" text-anchor="middle" font-size="10" fill="#d99a9a">leader keeps serving</text>
  <line x1="750.0" y1="212" x2="750.0" y2="230" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="590" y="230" width="320" height="50" rx="6" fill="#1c1014" stroke="#f87171" stroke-width="1.2"/>
  <text x="750" y="252" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Stop Patroni on primary</text>
  <text x="750" y="270" text-anchor="middle" font-size="10" fill="#d99a9a">clean shutdown · WAL flushed</text>
  <line x1="750.0" y1="280" x2="750.0" y2="298" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="590" y="298" width="320" height="50" rx="6" fill="#1c1014" stroke="#f87171" stroke-width="1.2"/>
  <text x="750" y="320" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Force-stop lingering postgres</text>
  <text x="750" y="338" text-anchor="middle" font-size="10" fill="#d99a9a">safety net · all nodes</text>
  <line x1="750.0" y1="348" x2="750.0" y2="366" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="590" y="366" width="320" height="50" rx="6" fill="#1c1014" stroke="#f87171" stroke-width="1.2"/>
  <text x="750" y="388" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Stop etcd</text>
  <text x="750" y="406" text-anchor="middle" font-size="10" fill="#d99a9a">all nodes · after everything else is down</text>
  <line x1="750.0" y1="416" x2="750.0" y2="448" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="630" y="448" width="240" height="34" rx="17" fill="#2a1416" stroke="#f87171" stroke-width="1.5"/>
  <text x="750" y="469" text-anchor="middle" font-size="12" font-weight="600" fill="#f5b8b8">cluster stopped · data intact</text>
  <text x="750" y="522" text-anchor="middle" font-size="10.5" fill="#7c8a9e">standbys first → primary always holds the freshest WAL ·</text>
  <text x="750" y="538" text-anchor="middle" font-size="10.5" fill="#7c8a9e">postgres_exporter keeps running throughout</text>
  <text x="1250" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#a78bfa">START / RECOVER</text>
  <rect x="1090" y="100" width="320" height="34" rx="17" fill="#1a1526" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="1250" y="121" text-anchor="middle" font-size="12" font-weight="600" fill="#c3aef0">POST /cluster/pgsql/start · /recover</text>
  <line x1="1250.0" y1="134" x2="1250.0" y2="162" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="1090" y="162" width="320" height="50" rx="6" fill="#151020" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="1250" y="184" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Kill orphaned etcd process</text>
  <text x="1250" y="202" text-anchor="middle" font-size="10" fill="#ab97d6">all nodes · clears a stale lock from a crashed node</text>
  <line x1="1250.0" y1="212" x2="1250.0" y2="230" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="1090" y="230" width="320" height="50" rx="6" fill="#151020" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="1250" y="252" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Refresh etcd peer list</text>
  <text x="1250" y="270" text-anchor="middle" font-size="10" fill="#ab97d6">all nodes · resyncs initial-cluster to current membership</text>
  <line x1="1250.0" y1="280" x2="1250.0" y2="298" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="1090" y="298" width="320" height="50" rx="6" fill="#151020" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="1250" y="320" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Skip stale peer validation</text>
  <text x="1250" y="338" text-anchor="middle" font-size="10" fill="#ab97d6">already-initialized nodes · forces initial-cluster-state = new</text>
  <line x1="1250.0" y1="348" x2="1250.0" y2="366" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="1090" y="366" width="320" height="50" rx="6" fill="#151020" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="1250" y="388" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Start etcd</text>
  <text x="1250" y="406" text-anchor="middle" font-size="10" fill="#ab97d6">all nodes · journal captured automatically on failure</text>
  <line x1="1250.0" y1="416" x2="1250.0" y2="434" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <rect x="1090" y="434" width="320" height="50" rx="6" fill="#151020" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="1250" y="456" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Start Patroni</text>
  <text x="1250" y="474" text-anchor="middle" font-size="10" fill="#ab97d6">primary first, then standbys · rejoin via DCS</text>
  <line x1="1250.0" y1="484" x2="1250.0" y2="522" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <polygon points="1250,522 1400,592 1250,662 1100,592" fill="#151020" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="1250" y="586" text-anchor="middle" font-size="12" font-weight="600" fill="#f5f5f9">cluster healthy?</text>
  <text x="1250" y="604" text-anchor="middle" font-size="10" fill="#ab97d6">Patroni /cluster · retries with backoff</text>
  <path d="M1250,662 V686 H1160 V694" fill="none" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <text x="1215" y="680" font-size="10.5" fill="#34d399">yes</text>
  <path d="M1250,662 V686 H1340 V694" fill="none" stroke="#8891a0" stroke-width="1.5" marker-end="url(#m-a)"/>
  <text x="1291" y="680" font-size="10.5" fill="#f87171">no, retries exhausted</text>
  <rect x="1074" y="694" width="172" height="34" rx="17" fill="#0f2620" stroke="#34d399" stroke-width="1.5"/>
  <text x="1160" y="715" text-anchor="middle" font-size="12" font-weight="600" fill="#8ff0ce">job completed</text>
  <rect x="1254" y="694" width="172" height="34" rx="17" fill="#2a1416" stroke="#f87171" stroke-width="1.5"/>
  <text x="1340" y="715" text-anchor="middle" font-size="12" font-weight="600" fill="#f5b8b8">job failed</text>
  <text x="1250" y="768" text-anchor="middle" font-size="10.5" fill="#7c8a9e">data directories are never touched · a destroyed node is not</text>
  <text x="1250" y="784" text-anchor="middle" font-size="10.5" fill="#7c8a9e">rebuilt automatically — use add-member for that</text>
  <rect x="90" y="830" width="1320" height="146" rx="6" fill="#11151c" stroke="#2a303c" stroke-width="1"/>
  <rect x="101" y="852" width="18" height="12" rx="3" fill="#34d399" opacity="0.85"/>
  <text x="130" y="862" font-size="11" fill="#c7cdd6">Deploy step — first-time cluster bootstrap</text>
  <rect x="101" y="878" width="18" height="12" rx="3" fill="#f87171" opacity="0.85"/>
  <text x="130" y="888" font-size="11" fill="#c7cdd6">Stop step — graceful, data-preserving shutdown</text>
  <rect x="101" y="904" width="18" height="12" rx="3" fill="#a78bfa" opacity="0.85"/>
  <text x="130" y="914" font-size="11" fill="#c7cdd6">Start/Recover step — resumes from on-disk state</text>
  <polygon points="770,851 777,858 770,865 763,858" fill="none" stroke="#8891a0" stroke-width="1.5"/>
  <text x="790" y="862" font-size="11" fill="#c7cdd6">Decision / poll-until-healthy gate</text>
  <line x1="761" y1="884" x2="779" y2="884" stroke="#9aa4b2" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="790" y="888" font-size="11" fill="#c7cdd6">Self-healing config repair (runs every time, harmless once already correct)</text>
</svg>
