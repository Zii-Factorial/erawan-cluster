<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1040" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="j-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8891a0"/></marker>
    <marker id="j-arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2dd4bf"/></marker>
  </defs>
  <rect x="0" y="0" width="1180" height="1040" fill="#0d1117"/>
  <text x="590" y="36" text-anchor="middle" font-size="22" font-weight="600" fill="#f5f5f9">Go API — Async Job Lifecycle</text>
  <text x="590" y="58" text-anchor="middle" font-size="13" fill="#9aa4b2">Shared by /cluster/mysql and /cluster/pgsql deploy, add-member, remove-member jobs</text>

  <!-- main column -->
  <rect x="380" y="100" width="420" height="56" rx="7" fill="#0f1826" stroke="#2dd4bf" stroke-width="1.3"/>
  <text x="398" y="122" font-size="12.5" font-weight="600" fill="#f5f5f9">POST /cluster/{engine}/deploy</text>
  <text x="398" y="140" font-size="10.5" fill="#9db8e3">{ cluster_name, primary_ip, standby_ips, ... }</text>

  <rect x="380" y="176" width="420" height="56" rx="7" fill="#0f1826" stroke="#2dd4bf" stroke-width="1.3"/>
  <text x="398" y="198" font-size="12.5" font-weight="600" fill="#f5f5f9">Validate request</text>
  <text x="398" y="216" font-size="10.5" fill="#9db8e3">IPs/ports/usernames checked, unknown fields rejected</text>

  <rect x="380" y="252" width="420" height="72" rx="7" fill="#0f1826" stroke="#2dd4bf" stroke-width="1.3"/>
  <text x="398" y="274" font-size="12.5" font-weight="600" fill="#f5f5f9">Create job (status=pending)</text>
  <text x="398" y="292" font-size="10.5" fill="#9db8e3">write &lt;jobID&gt;.json + encrypted &lt;jobID&gt;.secret</text>
  <text x="398" y="308" font-size="10.5" fill="#9db8e3">(root/admin passwords, 0600, never logged)</text>

  <rect x="380" y="344" width="420" height="56" rx="7" fill="#241a08" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="398" y="366" font-size="12.5" font-weight="600" fill="#f5f5f9">Return 202 Accepted { job_id }</text>
  <text x="398" y="384" font-size="10.5" fill="#e2c48a">HTTP response boundary — everything below runs async</text>

  <text x="590" y="424" text-anchor="middle" font-size="11" fill="#5b6473">── background goroutine begins ──</text>

  <rect x="380" y="440" width="420" height="56" rx="7" fill="#0f1826" stroke="#2dd4bf" stroke-width="1.3"/>
  <text x="398" y="462" font-size="12.5" font-weight="600" fill="#f5f5f9">Build temp Ansible inventory</text>
  <text x="398" y="480" font-size="10.5" fill="#9db8e3">from primary_ip / standby_ips for this job only</text>

  <rect x="380" y="516" width="420" height="72" rx="7" fill="#0f1826" stroke="#2dd4bf" stroke-width="1.3"/>
  <text x="398" y="538" font-size="12.5" font-weight="600" fill="#f5f5f9">Run ansible-playbook --tags &lt;step&gt;</text>
  <text x="398" y="556" font-size="10.5" fill="#9db8e3">-e &lt;vars&gt; --private-key ... -u clusterops</text>
  <text x="398" y="572" font-size="10.5" fill="#9db8e3">SSH into each node, apply the role for this step</text>

  <rect x="380" y="608" width="420" height="72" rx="7" fill="#0f1826" stroke="#2dd4bf" stroke-width="1.3"/>
  <text x="398" y="630" font-size="12.5" font-weight="600" fill="#f5f5f9">Update job file after each step</text>
  <text x="398" y="648" font-size="10.5" fill="#9db8e3">status=running, current_step, progress_percent,</text>
  <text x="398" y="664" font-size="10.5" fill="#9db8e3">last_completed_step</text>

  <path d="M800,644 H830 V552 H800" fill="none" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#j-arrow-teal)"/>
  <text x="838" y="601" font-size="9.5" fill="#2dd4bf">next step</text>

  <rect x="380" y="700" width="420" height="52" rx="7" fill="#171a22" stroke="#3a4150" stroke-width="1"/>
  <text x="590" y="731" text-anchor="middle" font-size="11.5" fill="#e2e6eb">loop until all steps complete, or one step fails</text>

  <line x1="530" y1="752" x2="420" y2="784" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-arrow)"/>
  <line x1="650" y1="752" x2="760" y2="784" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-arrow)"/>

  <!-- success -->
  <rect x="220" y="784" width="300" height="70" rx="7" fill="#0f2620" stroke="#34d399" stroke-width="1.3"/>
  <text x="238" y="808" font-size="12.5" font-weight="600" fill="#8ff0ce">status = completed</text>
  <text x="238" y="826" font-size="10.5" fill="#a9d9c4">client's next GET /jobs/{id} returns the secret</text>
  <text x="238" y="842" font-size="10.5" fill="#a9d9c4">(passwords) once, in the response body</text>

  <!-- failure -->
  <rect x="640" y="784" width="320" height="90" rx="7" fill="#2a1416" stroke="#f87171" stroke-width="1.3"/>
  <text x="658" y="808" font-size="12.5" font-weight="600" fill="#f5b8b8">status = failed</text>
  <text x="658" y="826" font-size="10.5" fill="#f0b3b3">error = &lt;message&gt;, last_completed_step = i-1</text>
  <text x="658" y="842" font-size="10.5" fill="#f0b3b3">step output captured (secrets/no_log fields</text>
  <text x="658" y="858" font-size="10.5" fill="#f0b3b3">redacted from logs)</text>

  <line x1="800" y1="874" x2="720" y2="900" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-arrow)"/>
  <line x1="800" y1="874" x2="920" y2="900" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-arrow)"/>

  <rect x="560" y="900" width="260" height="86" rx="7" fill="#0f1826" stroke="#60a5fa" stroke-width="1.3"/>
  <text x="578" y="924" font-size="12" font-weight="600" fill="#f5f5f9">POST /jobs/{id}/resume</text>
  <text x="578" y="942" font-size="10.5" fill="#9db8e3">re-runs from last_completed_step+1;</text>
  <text x="578" y="958" font-size="10.5" fill="#9db8e3">secrets must be re-supplied (not stored</text>
  <text x="578" y="974" font-size="10.5" fill="#9db8e3">in plaintext)</text>

  <rect x="840" y="900" width="260" height="86" rx="7" fill="#0f1826" stroke="#60a5fa" stroke-width="1.3"/>
  <text x="858" y="924" font-size="12" font-weight="600" fill="#f5f5f9">POST /jobs/{id}/rollback</text>
  <text x="858" y="942" font-size="10.5" fill="#9db8e3">runs the rollback playbook to undo the</text>
  <text x="858" y="958" font-size="10.5" fill="#9db8e3">cluster configuration applied so far</text>

  <path d="M690,986 V1010 H1140 V530 H800" fill="none" stroke="#2dd4bf" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#j-arrow-teal)"/>
  <text x="1152" y="740" font-size="10" fill="#2dd4bf" transform="rotate(-90 1152 740)">on resume: re-enters the playbook loop above</text>

  <!-- left: client polling -->
  <rect x="40" y="344" width="300" height="110" rx="7" fill="#171a22" stroke="#3a4150" stroke-width="1"/>
  <text x="58" y="368" font-size="12" font-weight="600" fill="#e2e6eb">Client polling loop</text>
  <text x="58" y="388" font-size="10.5" fill="#9aa4b2">GET /cluster/{engine}/jobs/{id}</text>
  <text x="58" y="404" font-size="10.5" fill="#9aa4b2">repeat until status != running</text>
  <text x="58" y="420" font-size="10.5" fill="#9aa4b2">(track progress via progress_percent</text>
  <text x="58" y="436" font-size="10.5" fill="#9aa4b2">and current_step in the meantime)</text>

  <line x1="380" y1="372" x2="340" y2="372" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#j-arrow)"/>
  <text x="360" y="362" text-anchor="middle" font-size="9.5" fill="#f59e0b" transform="rotate(0 360 362)"> </text>
  <path d="M340,430 C 360,500 360,600 380,644" fill="none" stroke="#8891a0" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#j-arrow)"/>
  <text x="300" y="540" font-size="10" fill="#8891a0">reads live job state</text>

  <!-- right: job storage -->
  <rect x="860" y="252" width="280" height="150" rx="7" fill="#171a22" stroke="#3a4150" stroke-width="1"/>
  <text x="878" y="276" font-size="12" font-weight="600" fill="#e2e6eb">Job file storage</text>
  <text x="878" y="296" font-size="10.5" fill="#9aa4b2">/var/lib/erawan-cluster/cluster/jobs/</text>
  <text x="878" y="312" font-size="10.5" fill="#9aa4b2">  {engine}/&lt;jobID&gt;.json  — state + step results</text>
  <text x="878" y="328" font-size="10.5" fill="#9aa4b2">  {engine}/&lt;jobID&gt;.secret — encrypted creds</text>
  <text x="878" y="348" font-size="10.5" fill="#9aa4b2">looked up later by add-member, dbmanager and</text>
  <text x="878" y="364" font-size="10.5" fill="#9aa4b2">metrics endpoints via job_id</text>
  <text x="878" y="386" font-size="10.5" fill="#9aa4b2">also read directly by /jobs/{id} for polling</text>

  <line x1="800" y1="288" x2="860" y2="288" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#j-arrow-teal)"/>

  <text x="590" y="1020" text-anchor="middle" font-size="10.5" fill="#7c8a9e">Sources: cmd/api/{mysql,pgsql}/handler.go, internal/cluster/{mysql,pgsql}/service.go</text>
</svg>
