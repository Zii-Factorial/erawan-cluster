<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="j-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8891a0"/></marker>
    <marker id="j-t" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2dd4bf"/></marker>
  </defs>
  <rect x="0" y="0" width="1200" height="860" fill="#0d1117"/>
  <text x="600" y="38" text-anchor="middle" font-size="21" font-weight="600" fill="#f5f5f9">Go API — Async Job Lifecycle</text>

  <!-- start -->
  <rect x="360" y="72" width="320" height="34" rx="17" fill="#0f2620" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="520" y="94" text-anchor="middle" font-size="12" fill="#8fe6da">POST /cluster/{engine}/deploy</text>

  <rect x="360" y="134" width="320" height="44" rx="6" fill="#101820" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="520" y="161" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Validate request</text>

  <rect x="360" y="206" width="320" height="44" rx="6" fill="#101820" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="520" y="233" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Create job · status = pending</text>

  <!-- job store cylinder -->
  <path d="M860,214 v52 a110,14 0 0 0 220,0 v-52" fill="#171a22" stroke="#8891a0" stroke-width="1.2"/>
  <ellipse cx="970" cy="214" rx="110" ry="14" fill="#171a22" stroke="#8891a0" stroke-width="1.2"/>
  <text x="970" y="248" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e6eb">job store</text>
  <text x="970" y="266" text-anchor="middle" font-size="10" fill="#9aa4b2">jobID.json + jobID.secret</text>
  <line x1="680" y1="228" x2="852" y2="228" stroke="#8891a0" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#j-a)"/>

  <!-- 202 -->
  <rect x="360" y="278" width="320" height="34" rx="17" fill="#241a08" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="520" y="300" text-anchor="middle" font-size="12" fill="#ffd48a">return 202 { job_id }</text>

  <!-- client -->
  <ellipse cx="140" cy="295" rx="78" ry="40" fill="#1c1f26" stroke="#d7dce2" stroke-width="1.5"/>
  <text x="140" y="291" text-anchor="middle" font-size="13" font-weight="600" fill="#f5f5f9">Client</text>
  <text x="140" y="309" text-anchor="middle" font-size="10" fill="#9aa4b2">polls GET /jobs/{id}</text>
  <line x1="360" y1="295" x2="222" y2="295" stroke="#2dd4bf" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#j-t)"/>

  <text x="520" y="348" text-anchor="middle" font-size="10.5" fill="#5b6473">— background goroutine —</text>

  <rect x="360" y="368" width="320" height="44" rx="6" fill="#101820" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="520" y="395" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Build Ansible inventory</text>

  <rect x="360" y="440" width="320" height="44" rx="6" fill="#101820" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="520" y="467" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5f5f9">Run playbook · step i</text>

  <!-- decision: step ok -->
  <polygon points="520,512 640,566 520,620 400,566" fill="#101820" stroke="#2dd4bf" stroke-width="1.3"/>
  <text x="520" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="#f5f5f9">step OK?</text>

  <!-- no -> failed -->
  <path d="M640,566 H820" fill="none" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-a)"/>
  <text x="660" y="556" font-size="10.5" fill="#f87171">no</text>
  <rect x="820" y="544" width="200" height="44" rx="6" fill="#2a1416" stroke="#f87171" stroke-width="1.3"/>
  <text x="920" y="571" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f5b8b8">status = failed</text>

  <!-- failed -> resume / rollback -->
  <path d="M880,588 V636" fill="none" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-a)"/>
  <path d="M960,588 V636" fill="none" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-a)"/>
  <rect x="770" y="636" width="180" height="40" rx="6" fill="#0f1826" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="860" y="661" text-anchor="middle" font-size="11.5" font-weight="600" fill="#9db8e3">POST /jobs/{id}/resume</text>
  <rect x="970" y="636" width="190" height="40" rx="6" fill="#0f1826" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="1065" y="661" text-anchor="middle" font-size="11.5" font-weight="600" fill="#9db8e3">POST /jobs/{id}/rollback</text>

  <!-- resume loop back to run step -->
  <path d="M770,656 H700 V462 H680" fill="none" stroke="#2dd4bf" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#j-t)"/>
  <text x="712" y="540" font-size="10" fill="#2dd4bf" transform="rotate(-90 712 540)">from last completed step</text>

  <!-- yes -> more steps -->
  <line x1="520" y1="620" x2="520" y2="656" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-a)"/>
  <text x="532" y="644" font-size="10.5" fill="#34d399">yes</text>

  <polygon points="520,656 640,710 520,764 400,710" fill="#101820" stroke="#2dd4bf" stroke-width="1.3"/>
  <text x="520" y="716" text-anchor="middle" font-size="12" font-weight="600" fill="#f5f5f9">more steps?</text>

  <!-- loop back -->
  <path d="M400,710 H300 V462 H360" fill="none" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-a)"/>
  <text x="312" y="580" font-size="10.5" fill="#9aa4b2" transform="rotate(-90 312 580)">yes · i++ · update job file</text>

  <!-- no -> completed -->
  <path d="M520,764 V790" fill="none" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-a)"/>
  <text x="532" y="784" font-size="10.5" fill="#9aa4b2">no</text>
  <rect x="400" y="790" width="240" height="34" rx="17" fill="#0f2620" stroke="#34d399" stroke-width="1.5"/>
  <text x="520" y="812" text-anchor="middle" font-size="12" font-weight="600" fill="#8ff0ce">status = completed</text>

  <!-- main flow arrows -->
  <line x1="520" y1="106" x2="520" y2="134" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-a)"/>
  <line x1="520" y1="178" x2="520" y2="206" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-a)"/>
  <line x1="520" y1="250" x2="520" y2="278" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-a)"/>
  <line x1="520" y1="312" x2="520" y2="368" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-a)"/>
  <line x1="520" y1="412" x2="520" y2="440" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-a)"/>
  <line x1="520" y1="484" x2="520" y2="512" stroke="#8891a0" stroke-width="1.5" marker-end="url(#j-a)"/>
</svg>
