<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 660" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="h-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8891a0"/></marker>
    <marker id="h-am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/></marker>
  </defs>
  <rect x="0" y="0" width="1300" height="660" fill="#0d1117"/>
  <text x="650" y="38" text-anchor="middle" font-size="21" font-weight="600" fill="#f5f5f9">HAProxy — Tenant Routing</text>
  <text x="650" y="60" text-anchor="middle" font-size="11" fill="#7c8a9e">solid = SQL to the active node · dashed = health checks · one healthy writer at a time</text>

  <!-- Clients -->
  <ellipse cx="120" cy="260" rx="80" ry="42" fill="#1c1f26" stroke="#d7dce2" stroke-width="1.5"/>
  <text x="120" y="256" text-anchor="middle" font-size="14" font-weight="600" fill="#f5f5f9">Clients</text>
  <text x="120" y="274" text-anchor="middle" font-size="10" fill="#9aa4b2">SQL only</text>

  <!-- HAProxy container -->
  <rect x="290" y="90" width="280" height="340" rx="12" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="310" y="118" font-size="12" font-weight="700" fill="#f59e0b" letter-spacing="1">HAPROXY</text>

  <rect x="320" y="150" width="220" height="60" rx="8" fill="#241a08" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="430" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#f5f5f9">:25041 · MySQL</text>
  <text x="430" y="194" text-anchor="middle" font-size="10" fill="#e2c48a">httpchk :9200 · balance first</text>

  <rect x="320" y="300" width="220" height="60" rx="8" fill="#241a08" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="430" y="326" text-anchor="middle" font-size="13" font-weight="600" fill="#f5f5f9">:25042 · PostgreSQL</text>
  <text x="430" y="344" text-anchor="middle" font-size="10" fill="#e2c48a">httpchk :8008 /leader · balance first</text>

  <!-- Clients -> listeners -->
  <path d="M200,245 H250 V180 H320" fill="none" stroke="#c7cdd6" stroke-width="2" marker-end="url(#h-a)"/>
  <path d="M200,275 H250 V330 H320" fill="none" stroke="#c7cdd6" stroke-width="2" marker-end="url(#h-a)"/>

  <!-- MySQL servers -->
  <text x="700" y="118" font-size="12.5" font-weight="700" fill="#60a5fa">MySQL nodes</text>
  <rect x="700" y="130" width="300" height="44" rx="6" fill="#0f2620" stroke="#34d399" stroke-width="1.5"/>
  <text x="716" y="157" font-size="12" font-weight="600" fill="#8ff0ce">db1 :3306 · ACTIVE (primary)</text>
  <rect x="700" y="186" width="300" height="44" rx="6" fill="#171a22" stroke="#5b6473" stroke-width="1.2"/>
  <text x="716" y="213" font-size="12" fill="#c7cdd6">db2 :3306 · backup</text>
  <rect x="700" y="242" width="300" height="44" rx="6" fill="#171a22" stroke="#5b6473" stroke-width="1.2"/>
  <text x="716" y="269" font-size="12" fill="#c7cdd6">db3 :3306 · backup</text>

  <path d="M540,166 H620 V152 H700" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#h-am)"/>
  <text x="600" y="142" font-size="10" fill="#f59e0b">SQL</text>
  <path d="M540,194 H620 V208 H700" fill="none" stroke="#5b6473" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#h-a)"/>
  <path d="M540,194 H620 V264 H700" fill="none" stroke="#5b6473" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#h-a)"/>
  <text x="600" y="230" font-size="10" fill="#7c8a9e">check</text>

  <!-- PgSQL servers -->
  <text x="700" y="318" font-size="12.5" font-weight="700" fill="#a78bfa">PostgreSQL nodes</text>
  <rect x="700" y="330" width="300" height="44" rx="6" fill="#0f2620" stroke="#34d399" stroke-width="1.5"/>
  <text x="716" y="357" font-size="12" font-weight="600" fill="#8ff0ce">db1 :5432 · ACTIVE (leader)</text>
  <rect x="700" y="386" width="300" height="44" rx="6" fill="#171a22" stroke="#5b6473" stroke-width="1.2"/>
  <text x="716" y="413" font-size="12" fill="#c7cdd6">db2 :5432 · backup</text>
  <rect x="700" y="442" width="300" height="44" rx="6" fill="#171a22" stroke="#5b6473" stroke-width="1.2"/>
  <text x="716" y="469" font-size="12" fill="#c7cdd6">db3 :5432 · backup</text>

  <path d="M540,316 H620 V352 H700" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#h-am)"/>
  <text x="600" y="342" font-size="10" fill="#f59e0b">SQL</text>
  <path d="M540,344 H600 V408 H700" fill="none" stroke="#5b6473" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#h-a)"/>
  <path d="M540,344 H600 V464 H700" fill="none" stroke="#5b6473" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#h-a)"/>
  <text x="580" y="430" font-size="10" fill="#7c8a9e">check</text>

  <!-- failover note -->
  <text x="1030" y="200" font-size="10.5" fill="#7c8a9e">on failover the new primary's</text>
  <text x="1030" y="216" font-size="10.5" fill="#7c8a9e">check returns 200 and HAProxy</text>
  <text x="1030" y="232" font-size="10.5" fill="#7c8a9e">reroutes within ~1s</text>

  <!-- config write pipeline -->
  <text x="80" y="540" font-size="12.5" font-weight="700" fill="#2dd4bf">API config write path</text>

  <path d="M60,566 v40 a80,10 0 0 0 160,0 v-40" fill="#171a22" stroke="#8891a0" stroke-width="1.2"/>
  <ellipse cx="140" cy="566" rx="80" ry="10" fill="#171a22" stroke="#8891a0" stroke-width="1.2"/>
  <text x="140" y="592" text-anchor="middle" font-size="11" font-weight="600" fill="#e2e6eb">tenants/*.cfg</text>
  <text x="140" y="608" text-anchor="middle" font-size="9.5" fill="#9aa4b2">one file per port</text>

  <rect x="290" y="566" width="200" height="44" rx="6" fill="#101820" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="390" y="588" text-anchor="middle" font-size="11.5" font-weight="600" fill="#f5f5f9">write cfg</text>
  <text x="390" y="603" text-anchor="middle" font-size="9.5" fill="#8fe6da">.bak kept</text>

  <rect x="530" y="566" width="200" height="44" rx="6" fill="#101820" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="630" y="588" text-anchor="middle" font-size="11.5" font-weight="600" fill="#f5f5f9">validate</text>
  <text x="630" y="603" text-anchor="middle" font-size="9.5" fill="#8fe6da">haproxy -c</text>

  <rect x="770" y="566" width="200" height="44" rx="6" fill="#101820" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="870" y="588" text-anchor="middle" font-size="11.5" font-weight="600" fill="#f5f5f9">reload</text>
  <text x="870" y="603" text-anchor="middle" font-size="9.5" fill="#8fe6da">graceful · no drops</text>

  <rect x="1010" y="566" width="200" height="44" rx="6" fill="#101820" stroke="#2dd4bf" stroke-width="1.2"/>
  <text x="1110" y="588" text-anchor="middle" font-size="11.5" font-weight="600" fill="#f5f5f9">verify port</text>
  <text x="1110" y="603" text-anchor="middle" font-size="9.5" fill="#8fe6da">listening or gone</text>

  <line x1="222" y1="588" x2="290" y2="588" stroke="#8891a0" stroke-width="1.5" marker-end="url(#h-a)"/>
  <line x1="490" y1="588" x2="530" y2="588" stroke="#8891a0" stroke-width="1.5" marker-end="url(#h-a)"/>
  <line x1="730" y1="588" x2="770" y2="588" stroke="#8891a0" stroke-width="1.5" marker-end="url(#h-a)"/>
  <line x1="970" y1="588" x2="1010" y2="588" stroke="#8891a0" stroke-width="1.5" marker-end="url(#h-a)"/>
  <text x="630" y="640" text-anchor="middle" font-size="10" fill="#f5b8b8">any failure → .bak restored immediately</text>
</svg>
